<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-bg-muted:#f4f4f5;--color-approved:#059669;--color-warning:#d97706;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
@keyframes asi-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.asi-dot{width:7px;height:7px;border-radius:50%;background:var(--color-text-secondary);animation:asi-pulse 1.1s infinite ease-in-out;}
.asi-dot:nth-child(2){animation-delay:.18s}
.asi-dot:nth-child(3){animation-delay:.36s}
@media (prefers-reduced-motion:reduce){.asi-dot{animation:none}}
</style>
</helmet>
<div style="display:inline-flex;align-items:center;gap:9px;font-family:'Inter',sans-serif;">
  <span style="width:22px;height:22px;border-radius:6px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="6.5" cy="11.5" r="2.5"/><circle cx="17.5" cy="13.5" r="2.5"/><path d="M2 21a10 10 0 0 1 16-4"/></svg>
  </span>
  <span style="font-size:0.8125rem;font-weight:600;color:var(--color-text-secondary);">{{ agent }}</span>
  <sc-if value="{{ showDots }}" hint-placeholder-val="{{ true }}">
    <span style="display:inline-flex;align-items:center;gap:4px;margin-left:1px;"><span class="asi-dot"></span><span class="asi-dot"></span><span class="asi-dot"></span></span>
  </sc-if>
  <sc-if value="{{ showStatus }}" hint-placeholder-val="{{ false }}">
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.8125rem;color:{{ statusColor }};"><span style="width:6px;height:6px;border-radius:50%;background:{{ statusColor }};"></span>{{ statusLabel }}</span>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:48},&quot;agent&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Production Planner&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;idle&quot;,&quot;options&quot;:[&quot;idle&quot;,&quot;thinking&quot;,&quot;streaming&quot;,&quot;awaiting-approval&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const status = this.props.status || 'idle';
    const MAP = {
      idle: ['Ready', 'var(--color-approved)'],
      thinking: ['Thinking', 'var(--color-text-muted)'],
      streaming: ['Working…', 'var(--color-text-secondary)'],
      'awaiting-approval': ['Waiting for your approval', 'var(--color-warning)'],
    };
    const m = MAP[status] || MAP.idle;
    return {
      agent: this.props.agent || 'Production Planner',
      showDots: status === 'thinking',
      showStatus: status !== 'thinking',
      statusLabel: this.props.label || m[0],
      statusColor: m[1],
    };
  }
}
</script>
</body>
</html>
