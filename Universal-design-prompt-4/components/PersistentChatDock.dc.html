<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-focus:#111;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-hover:#000;--color-action-text:#fff;--color-approved:#059669;--radius-md:.625rem;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
</style>
</helmet>
<div style="border-top:1px solid var(--color-border);background:var(--color-bg-card);padding:13px 20px 15px;font-family:'Inter',sans-serif;">
  <div style="max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:11px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:22px;height:22px;border-radius:6px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="6.5" cy="11.5" r="2.5"/><circle cx="17.5" cy="13.5" r="2.5"/><path d="M2 21a10 10 0 0 1 16-4"/></svg></span>
      <span style="font-size:0.75rem;font-weight:600;color:var(--color-text-secondary);">{{ agent }}</span>
      <span style="width:5px;height:5px;border-radius:50%;background:var(--color-approved);"></span>
    </div>
    <p style="margin:0;font-size:0.875rem;color:var(--color-text-primary);line-height:1.5;">{{ greeting }}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <sc-for list="{{ chips }}" as="c" hint-placeholder-count="3">
        <button style="height:34px;padding:0 13px;border:1px solid var(--color-border);background:var(--color-bg-card);color:var(--color-text-primary);border-radius:999px;font-size:0.875rem;font-weight:500;cursor:pointer;" style-hover="border-color:var(--color-border-strong);background:var(--color-bg-subtle);">{{ c.label }}</button>
      </sc-for>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 8px 0 14px;height:48px;" style-focus-within="border-color:var(--color-border-focus);">
      <button aria-label="Voice input" title="Voice input — coming soon" aria-disabled="true" style="border:none;background:transparent;color:var(--color-text-muted);cursor:pointer;display:flex;padding:4px;" style-hover="color:var(--color-text-primary);"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
      <input placeholder="{{ placeholder }}" style="flex:1;border:none;outline:none;background:transparent;font-size:0.875rem;color:var(--color-text-primary);font-family:inherit;" />
      <button aria-label="Send" style="width:34px;height:34px;flex-shrink:0;border:none;background:var(--color-action);color:var(--color-action-text);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;" style-hover="background:var(--color-action-hover);"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:700,&quot;height&quot;:210},&quot;agent&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Production Planner&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;greeting&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;You're working with Nike. 3 approvals need your review — next: generate IG deliverables for Spring Campaign.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;chips&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Generate deliverables,Review approvals,Plan a shoot&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ask anything…&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const raw = this.props.chips || 'Generate deliverables,Review approvals,Plan a shoot';
    const labels = Array.isArray(raw) ? raw : String(raw).split(',').map(s => s.trim());
    return {
      agent: this.props.agent || 'Production Planner',
      greeting: this.props.greeting || "You're working with Nike. 3 approvals need your review — next: generate IG deliverables for Spring Campaign.",
      chips: labels.map(label => ({ label })),
      placeholder: this.props.placeholder || 'Ask anything…',
    };
  }
}
</script>
</body>
</html>
