<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-subtle:#f0f0f1;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-text:#fff;--color-approved:#059669;--approval-border:#f3b93c;--radius-md:.625rem;--card-radius:1.25rem;--status-active-bg:#d1fae5;--status-active-text:#059669;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.mono{font-feature-settings:'tnum';}
</style>
</helmet>
<aside data-screen-label="IntelligencePanel" style="width:332px;height:100%;min-height:560px;background:var(--color-bg-card);border-left:1px solid var(--color-border);overflow-y:auto;font-family:'Inter',sans-serif;">
  <div style="padding:18px 18px 24px;display:flex;flex-direction:column;gap:18px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:1rem;font-weight:600;">{{ brand }}</span>
      <span style="font-size:0.6875rem;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--status-active-bg);color:var(--status-active-text);">active</span>
    </div>

    <div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;"><span style="font-size:0.875rem;color:var(--color-text-secondary);">DNA score</span><span class="mono" style="font-size:2rem;font-weight:700;line-height:1;">{{ score }}</span></div>
      <div style="height:6px;border-radius:6px;background:var(--color-bg-muted);overflow:hidden;"><span style="display:block;height:100%;width:{{ scoreW }};background:var(--color-approved);border-radius:6px;"></span></div>
      <div style="display:flex;flex-direction:column;gap:9px;margin-top:14px;">
        <sc-for list="{{ pillars }}" as="p" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:0.8125rem;color:var(--color-text-secondary);width:54px;flex-shrink:0;">{{ p.name }}</span><div style="flex:1;height:4px;border-radius:4px;background:var(--color-bg-muted);overflow:hidden;"><span style="display:block;height:100%;width:{{ p.w }};background:{{ p.color }};border-radius:4px;"></span></div><span class="mono" style="font-size:0.75rem;font-weight:600;width:26px;text-align:right;">{{ p.score }}</span></div>
        </sc-for>
      </div>
    </div>

    <div style="height:1px;background:var(--color-border-subtle);"></div>

    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;"><span style="font-size:0.875rem;font-weight:600;">Approvals</span><span class="mono" style="font-size:0.6875rem;font-weight:700;color:var(--color-action-text);background:var(--color-action);min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;">{{ approvalCount }}</span></div>
      <div style="display:flex;flex-direction:column;gap:9px;">
        <sc-for list="{{ approvals }}" as="a" hint-placeholder-count="3">
          <div style="border:1.5px solid var(--approval-border);background:#fffbf0;border-radius:var(--radius-md);padding:11px 12px;">
            <div style="display:flex;align-items:center;gap:7px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--approval-border);"></span><span style="font-size:0.8125rem;font-weight:600;flex:1;">{{ a.title }}</span></div>
            <div style="display:flex;align-items:center;gap:10px;margin-top:6px;"><span class="mono" style="font-size:0.6875rem;font-weight:600;color:{{ a.confColor }};">{{ a.confidence }}%</span><span style="font-size:0.6875rem;color:var(--color-text-muted);">{{ a.evidence }}</span></div>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="display:flex;gap:18px;border-top:1px solid var(--color-border-subtle);padding-top:12px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3"><span style="font-size:0.8125rem;font-weight:{{ t.weight }};color:{{ t.color }};border-bottom:2px solid {{ t.underline }};padding-bottom:6px;cursor:pointer;">{{ t.label }}</span></sc-for>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:332,&quot;height&quot;:580},&quot;brand&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Nike&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:87,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const score = this.props.score ?? 87;
    const pillarDefs = [['Brand',88],['Visual',65],['Voice',94]];
    const apprDefs = [['Brand DNA draft',87],['IG caption draft',72],['Shot list v2',91]];
    const cc = v => v >= 80 ? 'var(--color-approved)' : v >= 60 ? '#d97706' : '#dc2626';
    return {
      brand: this.props.brand || 'Nike',
      score, scoreW: score + '%',
      pillars: pillarDefs.map(([name,v]) => ({ name, score:v, w:v+'%', color: cc(v) })),
      approvalCount: apprDefs.length,
      approvals: apprDefs.map(([title,c]) => ({ title, confidence:c, confColor: cc(c), evidence:'web crawl' })),
      tabs: [['Overview',true],['Approvals',false],['Activity',false]].map(([label,on]) => ({
        label, weight: on ? '600' : '500',
        color: on ? 'var(--color-text-primary)' : 'var(--color-text-muted)',
        underline: on ? 'var(--color-text-primary)' : 'transparent',
      })),
    };
  }
}
</script>
</body>
</html>
