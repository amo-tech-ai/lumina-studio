<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-approved:#059669;--color-warning:#d97706;--card-radius:1.25rem;--image-radius:1.25rem;--image-radius-sm:0.75rem;--image-scrim:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.35));--shadow-card:0 1px 3px rgba(17,17,17,.05),0 1px 2px -1px rgba(17,17,17,.04);--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-muted);position:relative;}
.mono{font-feature-settings:'tnum';}
</style>
</helmet>
<button onClick="{{ onSelect }}" style="display:block;width:100%;height:100%;text-align:left;border:1px solid {{ border }};background:var(--color-bg-card);border-radius:{{ radiusVal }};overflow:hidden;cursor:pointer;padding:0;box-shadow:{{ shadowVal }};transition:border-color var(--duration-normal) var(--ease-default);font-family:'Inter',sans-serif;" style-hover="border-color:var(--color-border-strong);">
  <div class="photo" style="background-image:{{ cover }};width:100%;{{ imgExtra }}">
    <sc-if value="{{ scrim }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:0;background:var(--image-scrim);"></span></sc-if>
    <sc-if value="{{ standardBadge }}" hint-placeholder-val="{{ true }}">
      <span class="mono" style="position:absolute;top:9px;right:9px;display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:#fff;background:{{ matchBg }};backdrop-filter:blur(3px);padding:2px 8px;border-radius:7px;"><span style="width:5px;height:5px;border-radius:50%;background:{{ matchDot }};"></span>{{ match }}%</span>
    </sc-if>
    <sc-if value="{{ tile }}" hint-placeholder-val="{{ false }}">
      <span class="mono" style="position:absolute;bottom:3px;right:3px;font-size:9px;font-weight:600;color:#fff;background:{{ badgeColor }};border-radius:5px;padding:1px 4px;line-height:1.2;">{{ match }}</span>
    </sc-if>
    <sc-if value="{{ showType }}" hint-placeholder-val="{{ false }}">
      <span style="position:absolute;left:10px;bottom:9px;font-size:10px;font-weight:600;color:#fff;background:rgba(17,17,17,.45);backdrop-filter:blur(3px);padding:2px 8px;border-radius:6px;">{{ type }}</span>
    </sc-if>
  </div>
  <sc-if value="{{ showFooter }}" hint-placeholder-val="{{ false }}">
    <div style="padding:11px 13px 13px;">
      <div style="font-size:0.8125rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ filename }}</div>
      <div style="font-size:0.6875rem;color:var(--color-text-muted);margin-top:3px;">{{ shoot }}</div>
    </div>
  </sc-if>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:240,&quot;height&quot;:280},&quot;filename&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;airmax_hero_03.jpg&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;shoot&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Air Max Lookbook&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;type&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Photo&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;coverKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Image&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;card&quot;,&quot;options&quot;:[&quot;card&quot;,&quot;masonry&quot;,&quot;tile&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;ratio&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;1/1&quot;,&quot;options&quot;:[&quot;1/1&quot;,&quot;3/4&quot;,&quot;4/5&quot;,&quot;16/9&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;match&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:94,&quot;min&quot;:0,&quot;max&quot;:100,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;showFooter&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;showType&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;State&quot;},&quot;imgUrl&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;height&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;matchDot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;badgeColor&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;border&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const match = this.props.match ?? 94;
    const tile = this.props.variant === 'tile';
    const showFooter = tile ? false : (this.props.showFooter ?? true);
    const dotColor = m => m >= 85 ? '#059669' : m >= 70 ? '#9ca3af' : '#b45309';
    return {
      cover: this.props.imgUrl || `url("../images/${this.props.coverKey || '16'}-fashionos.jpeg")`,
      // tile: tiny square moodboard thumb; masonry: explicit pixel height; card: aspect ratio
      imgExtra: tile ? 'aspect-ratio:1/1;' : (this.props.height ? `height:${this.props.height};` : `aspect-ratio:${this.props.ratio || '1/1'};`),
      radiusVal: tile ? 'var(--image-radius-sm)' : 'var(--image-radius)',
      shadowVal: tile ? 'none' : 'var(--shadow-card)',
      tile,
      scrim: !tile,
      standardBadge: !tile,
      badgeColor: this.props.badgeColor || dotColor(match),
      match,
      matchDot: this.props.matchDot || dotColor(match),
      // parity: when the host supplies matchDot the badge stays dark (dot carries status);
      // standalone, a low match flags the whole badge amber.
      matchBg: this.props.matchDot ? 'rgba(17,17,17,.55)' : (match < 70 ? 'rgba(180,83,9,.85)' : 'rgba(17,17,17,.55)'),
      type: this.props.type || 'Photo',
      showType: tile ? false : (this.props.showType ?? !showFooter),
      showFooter,
      filename: this.props.filename || 'airmax_hero_03.jpg',
      shoot: this.props.shoot || 'Air Max Lookbook',
      border: this.props.border || (this.props.selected ? 'var(--color-text-primary)' : 'var(--color-border)'),
      onSelect: this.props.onSelect || (() => {}),
    };
  }
}
</script>
</body>
</html>
