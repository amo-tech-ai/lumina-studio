<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-page:#fff;--color-border:#e5e7eb;--color-text-muted:#9ca3af;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;}
</style>
</helmet>
<div style="display:grid;grid-template-columns:auto minmax(0,1fr) auto;height:100%;min-height:580px;width:100%;background:var(--color-bg-page);overflow:hidden;font-family:'Inter',sans-serif;">
  <dc-import name="NavSidebar" hint-size="3.5rem,100%"></dc-import>
  <main data-screen-label="Workspace" style="display:flex;flex-direction:column;min-width:0;height:100%;">
    <div style="flex:1;overflow-y:auto;padding:28px 32px;">
      <dc-import name="PageHeader" title="{{ wsTitle }}" subtitle="{{ wsSub }}" action-label="New" hint-size="100%,90px"></dc-import>
      <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--color-border);border-radius:14px;color:var(--color-text-muted);font-size:0.875rem;min-height:240px;">Workspace content slot</div>
    </div>
    <dc-import name="PersistentChatDock" agent="{{ agent }}" hint-size="100%,200px"></dc-import>
  </main>
  <dc-import name="IntelligencePanel" brand="{{ brand }}" hint-size="332px,100%"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:720},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Command Center&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;3 approvals need your review&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;agent&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Production Planner&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;brand&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Nike&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals(){
    return {
      wsTitle: this.props.title || 'Command Center',
      wsSub: this.props.subtitle || '3 approvals need your review',
      agent: this.props.agent || 'Production Planner',
      brand: this.props.brand || 'Nike',
    };
  }
}
</script>
</body>
</html>
