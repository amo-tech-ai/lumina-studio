<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-border:#e5e7eb;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-text:#fff;--radius-md:.625rem;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
</style>
</helmet>
<div style="font-family:'Inter',sans-serif;">
  <sc-if value="{{ hasCrumb }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;align-items:center;gap:7px;font-size:0.875rem;color:var(--color-text-muted);margin-bottom:8px;"><span>{{ crumb }}</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg><span style="color:var(--color-text-secondary);">{{ title }}</span></div>
  </sc-if>
  <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;">
    <div>
      <h1 style="margin:0;font-size:1.5rem;font-weight:600;letter-spacing:-.01em;">{{ title }}</h1>
      <sc-if value="{{ hasSub }}" hint-placeholder-val="{{ true }}"><p style="margin:5px 0 0;font-size:0.875rem;color:var(--color-text-secondary);">{{ subtitle }}</p></sc-if>
    </div>
    <sc-if value="{{ hasAction }}" hint-placeholder-val="{{ true }}">
      <button style="height:40px;padding:0 18px;border:none;border-radius:var(--radius-md);background:var(--color-action);color:var(--color-action-text);font-size:0.875rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>{{ actionLabel }}</button>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:620,&quot;height&quot;:90},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Brands&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;3 brands · 1 needs attention&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;crumb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;actionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;New brand&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Action&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const crumb = this.props.crumb ?? '';
    const sub = this.props.subtitle ?? '';
    const action = this.props.actionLabel ?? '';
    return {
      title: this.props.title || 'Brands',
      hasCrumb: crumb !== '',
      crumb,
      hasSub: sub !== '',
      subtitle: sub,
      hasAction: action !== '',
      actionLabel: action,
    };
  }
}
</script>
</body>
</html>
