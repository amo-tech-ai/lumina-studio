<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-border:#e5e7eb;--color-border-focus:#111;--color-text-primary:#111;--color-text-muted:#9ca3af;--radius-md:.625rem;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;}
</style>
</helmet>
<div style="display:flex;align-items:center;gap:9px;background:var(--color-bg-subtle);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 13px;height:40px;font-family:'Inter',sans-serif;" style-focus-within="border-color:var(--color-border-focus);background:var(--color-bg-card);">
  <span style="display:flex;color:var(--color-text-muted);flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
  <input placeholder="{{ placeholder }}" style="flex:1;border:none;outline:none;background:transparent;font-size:0.875rem;color:var(--color-text-primary);font-family:inherit;" />
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:56},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Search brands…&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){ return { placeholder: this.props.placeholder || 'Search…' }; }
}
</script>
</body>
</html>
