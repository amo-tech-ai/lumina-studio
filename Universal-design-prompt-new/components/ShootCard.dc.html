<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--card-radius:1.25rem;--image-scrim:linear-gradient(to bottom,transparent 45%,rgba(0,0,0,.5));--shadow-card:0 1px 3px rgba(17,17,17,.05),0 1px 2px -1px rgba(17,17,17,.04);--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-muted);position:relative;}
.mono{font-feature-settings:'tnum';}
</style>
</helmet>
<button onClick="{{ onSelect }}" style="text-align:left;width:100%;border:1px solid {{ cardBorder }};background:var(--color-bg-card);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;padding:0;box-shadow:var(--shadow-card);transition:border-color var(--duration-normal) var(--ease-default);font-family:'Inter',sans-serif;" style-hover="border-color:var(--color-border-strong);">
  <div class="photo" style="background-image:{{ cover }};width:100%;aspect-ratio:4/3;">
    <span style="position:absolute;inset:0;background:var(--image-scrim);"></span>
    <span class="mono" style="position:absolute;top:9px;right:9px;font-size:10px;font-weight:600;color:#fff;background:rgba(17,17,17,.55);backdrop-filter:blur(3px);padding:2px 7px;border-radius:7px;">DNA {{ score }}</span>
    <span style="position:absolute;left:11px;bottom:10px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#fff;background:rgba(17,17,17,.5);backdrop-filter:blur(3px);padding:3px 9px;border-radius:999px;"><span style="width:6px;height:6px;border-radius:50%;background:{{ statusDot }};"></span>{{ statusLabel }}</span>
  </div>
  <div style="padding:13px 14px 15px;">
    <div style="font-size:0.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ title }}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px;">
      <span style="font-size:0.75rem;color:var(--color-text-muted);">{{ brand }}</span>
      <span class="mono" style="font-size:0.75rem;color:var(--color-text-muted);">{{ date }}</span>
    </div>
  </div>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:300},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Air Max Lookbook&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;brand&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Nike&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Apr 18&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;coverKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;7&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Image&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;in-production&quot;,&quot;options&quot;:[&quot;draft&quot;,&quot;confirmed&quot;,&quot;in-production&quot;,&quot;complete&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:92,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;coverUrl&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;statusLabel&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;statusDot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;cardBorder&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const DOT = { draft:'#9ca3af', confirmed:'#2563eb', 'in-production':'#d97706', complete:'#059669' };
    const LABEL = { draft:'Draft', confirmed:'Confirmed', 'in-production':'In Production', complete:'Complete' };
    const status = this.props.status || 'in-production';
    const selected = this.props.selected || false;
    return {
      // cover: accept a ready-made url (coverUrl) or derive from a key
      cover: this.props.coverUrl || `url("../images/${this.props.coverKey || '7'}-fashionos.jpeg")`,
      title: this.props.title || 'Air Max Lookbook',
      brand: this.props.brand || 'Nike',
      date: this.props.date || 'Apr 18',
      score: this.props.score ?? 92,
      // presentation: accept derived values or map from a status key
      statusLabel: this.props.statusLabel || LABEL[status] || status,
      statusDot: this.props.statusDot || DOT[status] || DOT['in-production'],
      cardBorder: this.props.cardBorder || (selected ? 'var(--color-text-primary)' : 'var(--color-border)'),
      onSelect: this.props.onSelect || (() => {}),
    };
  }
}
</script>
</body>
</html>
