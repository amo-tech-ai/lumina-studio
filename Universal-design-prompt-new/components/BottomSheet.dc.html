<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-text:#fff;--radius-md:.625rem;--shadow-modal:0 24px 64px -16px rgba(17,17,17,.3);--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
</style>
</helmet>
<div style="position:relative;width:100%;height:100%;min-height:380px;background:var(--color-bg-subtle);border:1px solid var(--color-border);border-radius:18px;overflow:hidden;font-family:'Inter',sans-serif;">
  <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--color-border);background:var(--color-bg-card);">
    <span style="font-size:0.875rem;font-weight:600;">{{ screenLabel }}</span>
    <button onClick="{{ toggle }}" style="height:34px;padding:0 14px;border:1px solid var(--color-border);border-radius:999px;background:var(--color-bg-card);font-size:0.8125rem;font-weight:600;cursor:pointer;" style-hover="background:var(--color-bg-subtle);">{{ triggerLabel }}</button>
  </div>

  <div onClick="{{ close }}" style="position:absolute;inset:0;background:rgba(17,17,17,.42);opacity:{{ backdropOpacity }};pointer-events:{{ backdropPE }};transition:opacity var(--duration-normal);"></div>

  <div style="position:absolute;left:0;right:0;bottom:0;height:{{ sheetHeight }};background:var(--color-bg-card);border-top:1px solid var(--color-border);border-radius:18px 18px 0 0;box-shadow:var(--shadow-modal);transform:translateY({{ sheetY }});transition:transform var(--duration-normal) var(--ease-default);">
    <div onClick="{{ toggle }}" style="display:flex;align-items:center;justify-content:center;padding:10px 0 6px;cursor:pointer;"><span style="width:36px;height:4px;border-radius:2px;background:var(--color-border-strong);"></span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 16px 10px;">
      <span style="font-size:0.875rem;font-weight:600;">{{ title }}</span>
      <button onClick="{{ close }}" aria-label="Close" style="border:none;background:transparent;color:var(--color-text-muted);cursor:pointer;padding:4px;display:flex;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="padding:0 16px 16px;font-size:0.875rem;color:var(--color-text-secondary);line-height:1.55;">{{ body }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:400},&quot;screenLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Workspace&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;triggerLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Insights&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Insights&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;body&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Sheet content reflows the desktop IntelligencePanel into one column.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;height&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;62%&quot;,&quot;options&quot;:[&quot;38%&quot;,&quot;62%&quot;,&quot;90%&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false };
  renderVals(){
    const open = this.state.open;
    return {
      screenLabel: this.props.screenLabel || 'Workspace',
      triggerLabel: this.props.triggerLabel || 'Insights',
      title: this.props.title || 'Insights',
      body: this.props.body || 'Sheet content reflows the desktop IntelligencePanel into one column. Drag the handle or tap the backdrop to dismiss.',
      sheetHeight: this.props.height || '62%',
      toggle: () => this.setState(s => ({ open: !s.open })),
      close: () => this.setState({ open: false }),
      sheetY: open ? '0%' : '101%',
      backdropOpacity: open ? '1' : '0',
      backdropPE: open ? 'auto' : 'none',
    };
  }
}
</script>
</body>
</html>
