<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-border:#e5e7eb;--color-text-primary:#111;--color-text-secondary:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;}
</style>
</helmet>
<nav aria-label="Primary" style="display:flex;width:100%;max-width:420px;height:56px;padding:0 4px;background:var(--color-bg-card);border-top:1px solid var(--color-border);font-family:'Inter',sans-serif;">
  <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
    <button onClick="{{ t.set }}" aria-label="{{ t.label }}" style="flex:1;min-width:0;height:100%;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:{{ t.color }};cursor:pointer;padding-top:6px;">
      <span style="display:flex;" data-om-raster>{{ t.icon }}</span>
      <span style="font-size:10px;font-weight:{{ t.weight }};letter-spacing:.01em;">{{ t.label }}</span>
    </button>
  </sc-for>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:56}}">
class Component extends DCLogic {
  state = { active: 0 };
  ico(name){
    const p = { width:20, height:20, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.7, strokeLinecap:'round', strokeLinejoin:'round' };
    const d = {
      home:[['path',{d:'M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z'}]],
      camera:[['path',{d:'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z'}],['circle',{cx:12,cy:13,r:3}]],
      grid:[['rect',{x:3,y:3,width:7,height:7,rx:1}],['rect',{x:14,y:3,width:7,height:7,rx:1}],['rect',{x:14,y:14,width:7,height:7,rx:1}],['rect',{x:3,y:14,width:7,height:7,rx:1}]],
      layers:[['path',{d:'m12.83 2.18 8.36 4.18a1 1 0 0 1 0 1.79l-8.36 4.18a2 2 0 0 1-1.66 0L2.81 8.15a1 1 0 0 1 0-1.79l8.36-4.18a2 2 0 0 1 1.66 0z'}],['path',{d:'m2 12 9.34 4.67a2 2 0 0 0 1.66 0L22 12'}],['path',{d:'m2 17 9.34 4.67a2 2 0 0 0 1.66 0L22 17'}]],
      more:[['circle',{cx:5,cy:12,r:1.5}],['circle',{cx:12,cy:12,r:1.5}],['circle',{cx:19,cy:12,r:1.5}]],
    };
    return React.createElement('svg', p, (d[name]||d.home).map((n,i) => React.createElement(n[0], { key:i, ...n[1] })));
  }
  renderVals(){
    const defs = [['home','Home'],['camera','Shoots'],['grid','Assets'],['layers','Brands'],['more','More']];
    const active = this.state.active;
    return {
      tabs: defs.map(([k,label], i) => ({
        label, icon: this.ico(k),
        set: () => this.setState({ active: i }),
        color: i === active ? 'var(--color-text-primary)' : 'var(--color-text-secondary)',
        weight: i === active ? '600' : '500',
      })),
    };
  }
}
</script>
</body>
</html>
