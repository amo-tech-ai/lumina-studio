<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-hover:#000;--color-action-text:#fff;--radius-md:.625rem;--card-radius:1.25rem;--image-scrim:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.4));--shadow-card:0 1px 3px rgba(17,17,17,.05),0 1px 2px -1px rgba(17,17,17,.04);--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center top;background-color:var(--color-bg-subtle);position:relative;}
.mono{font-feature-settings:'tnum';}
@keyframes bc-pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes bc-indet{0%{left:-40%;}100%{left:100%;}}
@media (prefers-reduced-motion:reduce){.pulse-dot,.indet-bar{animation:none !important;}}
</style>
</helmet>
<div style="border:1px solid {{ cardBorder }};background:var(--color-bg-card);border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--shadow-card);display:flex;flex-direction:column;transition:border-color var(--duration-normal) var(--ease-default);font-family:'Inter',sans-serif;" style-hover="border-color:var(--color-border-strong);">
  <div class="photo" onClick="{{ onOpen }}" role="button" aria-label="Open brand" style="background-image:{{ cover }};width:100%;aspect-ratio:16/9;cursor:pointer;">
    <span style="position:absolute;inset:0;background:var(--image-scrim);"></span>
    <span style="position:absolute;top:10px;right:10px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#fff;background:rgba(17,17,17,.5);backdrop-filter:blur(3px);padding:3px 9px;border-radius:999px;"><span class="{{ dotClass }}" style="width:6px;height:6px;border-radius:50%;background:{{ statusDot }};"></span>{{ status }}</span>
  </div>
  <div style="padding:15px 16px 16px;display:flex;flex-direction:column;flex:1;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <span style="font-size:1rem;font-weight:600;">{{ title }}</span>
      <span style="font-size:0.75rem;color:var(--color-text-muted);">{{ site }}</span>
    </div>

    <sc-if value="{{ hasData }}" hint-placeholder-val="{{ true }}">
      <sc-if value="{{ analysing }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top:14px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--color-text-primary);"><span class="pulse-dot" style="width:8px;height:8px;border-radius:50%;background:var(--color-text-primary);animation:bc-pulse 1s infinite;flex-shrink:0;"></span>Crawling {{ site }}… <span class="mono" style="font-weight:600;">{{ crawl }}/47</span></div>
          <div style="position:relative;height:6px;margin-top:12px;border-radius:6px;background:var(--color-bg-muted);overflow:hidden;"><span class="indet-bar" style="position:absolute;top:0;height:100%;width:40%;border-radius:6px;background:var(--color-text-primary);animation:bc-indet 1.1s infinite var(--ease-default);"></span></div>
        </div>
      </sc-if>
      <sc-if value="{{ showScore }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:flex-end;gap:10px;margin-top:14px;">
          <span class="mono" style="font-size:1.5rem;font-weight:700;line-height:1;">{{ dna }}</span>
          <span style="font-size:0.75rem;color:var(--color-text-muted);padding-bottom:3px;letter-spacing:.04em;">DNA</span>
          <div style="flex:1;height:6px;border-radius:6px;background:var(--color-bg-muted);overflow:hidden;margin-bottom:4px;"><span style="display:block;height:100%;width:{{ dnaW }};background:var(--color-text-primary);border-radius:6px;"></span></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:12px;">
          <sc-for list="{{ pillars }}" as="p" hint-placeholder-count="4">
            <span style="font-size:0.75rem;color:var(--color-text-muted);">{{ p.name }} <span class="mono" style="font-weight:600;color:{{ p.color }};">{{ p.score }}{{ p.star }}</span></span>
          </sc-for>
        </div>
      </sc-if>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button onClick="{{ onOpen }}" style="flex:1;height:36px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-card);color:var(--color-text-primary);font-size:0.875rem;font-weight:600;cursor:pointer;" style-hover="background:var(--color-bg-subtle);">View</button>
        <button onClick="{{ onAnalyse }}" style="height:36px;padding:0 14px;border:none;border-radius:var(--radius-md);background:transparent;color:var(--color-text-secondary);font-size:0.875rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;" style-hover="background:var(--color-bg-subtle);">{{ analyseLabel }}</button>
      </div>
    </sc-if>

    <sc-if value="{{ noData }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top:14px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;">
        <p style="margin:0 0 14px;font-size:0.875rem;color:var(--color-text-muted);">No DNA profile yet. Run an analysis to score this brand.</p>
        <button onClick="{{ onAnalyse }}" style="height:38px;border:none;border-radius:var(--radius-md);background:var(--color-action);color:var(--color-action-text);font-size:0.875rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;" style-hover="background:var(--color-action-hover);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437z"/></svg>Analyse brand</button>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:320},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Nike&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;site&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;nike.com&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;coverKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;5&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Image&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Active&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;dna&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:87,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;hasData&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;State&quot;},&quot;analysing&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;State&quot;},&quot;showScore&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;State&quot;},&quot;noData&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;State&quot;},&quot;statusDot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;dotClass&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;cardBorder&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;coverUrl&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;dnaW&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;crawl&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number&quot;},&quot;pillars&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&quot;},&quot;analyseLabel&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onAnalyse&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const dna = this.props.dna ?? 87;
    const defaultPillars = [
      { name:'Brand', score:88, star:'', color:'var(--color-text-secondary)' },
      { name:'Visual', score:72, star:'*', color:'#b45309' },
      { name:'Voice', score:94, star:'', color:'var(--color-text-secondary)' },
      { name:'Commerce', score:79, star:'', color:'var(--color-text-secondary)' },
    ];
    return {
      cover: this.props.coverUrl || `url("../images/${this.props.coverKey || '5'}-fashionos.jpeg")`,
      title: this.props.title || 'Nike',
      site: this.props.site || 'nike.com',
      status: this.props.status || 'Active',
      statusDot: this.props.statusDot || '#059669',
      dotClass: this.props.dotClass || '',
      cardBorder: this.props.cardBorder || 'var(--color-border)',
      hasData: this.props.hasData ?? true,
      analysing: this.props.analysing ?? false,
      showScore: this.props.showScore ?? true,
      noData: this.props.noData ?? false,
      dna,
      dnaW: this.props.dnaW || (dna + '%'),
      crawl: this.props.crawl ?? 0,
      pillars: this.props.pillars || defaultPillars,
      analyseLabel: this.props.analyseLabel || 'Analyse',
      onAnalyse: this.props.onAnalyse || (() => {}),
      onOpen: this.props.onOpen || (() => {}),
    };
  }
}
</script>
</body>
</html>
