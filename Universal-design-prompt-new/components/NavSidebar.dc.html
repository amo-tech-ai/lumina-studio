<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-border:#e5e7eb;--color-border-subtle:#f0f0f1;--color-text-primary:#111;--color-text-secondary:#6b7280;--color-text-muted:#9ca3af;--nav-item-active:#f4f4f5;--nav-item-hover:#f4f4f5;--color-action:#111;--color-action-text:#fff;--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-subtle);}
</style>
</helmet>
<nav data-screen-label="NavSidebar" style="width:{{ navWidth }};height:100%;min-height:520px;background:var(--color-bg-card);border-right:1px solid var(--color-border);display:flex;flex-direction:column;justify-content:space-between;padding:14px 10px;transition:width var(--duration-normal) var(--ease-default);overflow:hidden;font-family:'Inter',sans-serif;">
  <div style="display:flex;flex-direction:column;gap:6px;">
    <button onClick="{{ toggle }}" aria-label="Toggle navigation" style="display:flex;align-items:center;gap:12px;height:36px;padding:0 7px;border:none;background:transparent;border-radius:8px;color:var(--color-text-secondary);cursor:pointer;" style-hover="background:var(--nav-item-hover);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" style="flex-shrink:0;"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <sc-if value="{{ expanded }}" hint-placeholder-val="{{ false }}"><span style="font-size:0.875rem;font-weight:600;white-space:nowrap;">iPix</span></sc-if>
    </button>
    <div style="height:1px;background:var(--color-border-subtle);margin:6px 4px;"></div>
    <sc-if value="{{ expanded }}" hint-placeholder-val="{{ false }}"><div style="font-size:0.6875rem;font-weight:500;letter-spacing:.06em;color:var(--color-text-muted);padding:4px 8px 2px;white-space:nowrap;">BRANDS</div></sc-if>
    <sc-for list="{{ brands }}" as="b" hint-placeholder-count="3">
      <button style="display:flex;align-items:center;gap:12px;height:40px;padding:0 7px;border:none;background:{{ b.bg }};border-radius:8px;cursor:pointer;" style-hover="background:var(--nav-item-hover);">
        <span class="photo" style="background-image:{{ b.img }};position:relative;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid var(--color-border);"><span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:{{ b.dot }};border:1.5px solid var(--color-bg-card);"></span></span>
        <sc-if value="{{ expanded }}" hint-placeholder-val="{{ false }}"><span style="font-size:0.875rem;font-weight:{{ b.weight }};color:{{ b.color }};white-space:nowrap;">{{ b.name }}</span></sc-if>
      </button>
    </sc-for>
    <div style="height:1px;background:var(--color-border-subtle);margin:6px 4px;"></div>
    <sc-for list="{{ items }}" as="n" hint-placeholder-count="5">
      <button style="display:flex;align-items:center;gap:12px;height:38px;padding:0 8px;border:none;background:{{ n.bg }};border-radius:8px;color:{{ n.color }};cursor:pointer;" style-hover="background:var(--nav-item-hover);">
        <span style="flex-shrink:0;display:flex;" data-om-raster>{{ n.icon }}</span>
        <sc-if value="{{ expanded }}" hint-placeholder-val="{{ false }}"><span style="font-size:0.875rem;font-weight:{{ n.weight }};white-space:nowrap;">{{ n.label }}</span></sc-if>
      </button>
    </sc-for>
  </div>
  <button style="display:flex;align-items:center;gap:12px;height:40px;padding:0 6px;border:none;background:transparent;border-radius:8px;cursor:pointer;" style-hover="background:var(--nav-item-hover);">
    <span style="flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--color-action);color:var(--color-action-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">SK</span>
    <sc-if value="{{ expanded }}" hint-placeholder-val="{{ false }}"><span style="font-size:0.875rem;color:var(--color-text-secondary);white-space:nowrap;">Sasha Kim</span></sc-if>
  </button>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:230,&quot;height&quot;:540}}">
class Component extends DCLogic {
  state = { expanded: false };
  ico(name){
    const p = { width:20, height:20, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.7, strokeLinecap:'round', strokeLinejoin:'round' };
    const d = {
      home:[['path',{d:'M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z'}]],
      camera:[['path',{d:'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z'}],['circle',{cx:12,cy:13,r:3}]],
      grid:[['rect',{x:3,y:3,width:7,height:7,rx:1}],['rect',{x:14,y:3,width:7,height:7,rx:1}],['rect',{x:14,y:14,width:7,height:7,rx:1}],['rect',{x:3,y:14,width:7,height:7,rx:1}]],
      megaphone:[['path',{d:'m3 11 18-5v12L3 14v-3z'}],['path',{d:'M11.6 16.8a3 3 0 1 1-5.8-1.6'}]],
      monitor:[['rect',{x:2,y:3,width:20,height:14,rx:2}],['line',{x1:8,y1:21,x2:16,y2:21}],['line',{x1:12,y1:17,x2:12,y2:21}]],
    };
    return React.createElement('svg', p, (d[name]||d.home).map((n,i) => React.createElement(n[0], { key:i, ...n[1] })));
  }
  renderVals(){
    const exp = this.state.expanded;
    const brandDefs = [['Nike','5',true],['Adidas','6',false],['Zara','9',false]];
    const itemDefs = [['home','Home',true],['camera','Shoots',false],['grid','Assets',false],['megaphone','Campaigns',false],['monitor','Preview',false]];
    return {
      navWidth: exp ? '14rem' : '3.5rem',
      expanded: exp,
      toggle: () => this.setState(s => ({ expanded: !s.expanded })),
      brands: brandDefs.map(([name,key,active]) => ({
        name, img: `url("../images/${key}-fashionos.jpeg")`,
        bg: active ? 'var(--nav-item-active)' : 'transparent',
        dot: active ? '#111' : '#c4c7cc',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-secondary)',
        weight: active ? '600' : '400',
      })),
      items: itemDefs.map(([k,label,active]) => ({
        label, icon: this.ico(k),
        bg: active ? 'var(--nav-item-active)' : 'transparent',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-secondary)',
        weight: active ? '600' : '500',
      })),
    };
  }
}
</script>
</body>
</html>
