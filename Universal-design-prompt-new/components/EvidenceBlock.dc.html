<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-border-subtle:#f0f0f1;--color-text-primary:#111;--color-text-secondary:#6b7280;--color-text-muted:#9ca3af;--color-action:#111;--color-action-hover:#000;--color-action-text:#fff;--color-approved:#059669;--color-warning:#b45309;--radius-md:.625rem;--card-radius:1.25rem;--image-radius-sm:.75rem;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.mono{font-feature-settings:'tnum';}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-subtle);}
</style>
</helmet>
<div role="group" aria-label="Evidence for {{ title }}" style="border:1px solid var(--color-border);background:var(--color-bg-card);border-radius:var(--card-radius);overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- header: score + potential + confidence -->
  <div style="padding:16px 18px;border-bottom:1px solid var(--color-border-subtle);">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div style="min-width:0;">
        <div style="font-size:.95rem;font-weight:600;">{{ title }}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:5px;">
          <span style="display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;color:var(--color-text-secondary);"><span style="width:6px;height:6px;border-radius:50%;background:{{ confDot }};"></span>{{ confidence }}% confidence</span>
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:10px;flex-shrink:0;">
        <div style="text-align:right;"><div class="mono" style="font-size:1.6rem;font-weight:700;line-height:1;color:{{ scoreColor }};">{{ score }}</div><div style="font-size:.62rem;color:var(--color-text-muted);letter-spacing:.05em;text-transform:uppercase;">now</div></div>
        <sc-if value="{{ hasPotential }}" hint-placeholder-val="{{ true }}">
          <span style="color:var(--color-text-muted);padding-bottom:14px;">→</span>
          <div style="text-align:right;"><div class="mono" style="font-size:1.6rem;font-weight:700;line-height:1;color:var(--color-approved);">{{ potential }}</div><div style="font-size:.62rem;color:var(--color-approved);letter-spacing:.05em;text-transform:uppercase;">potential</div></div>
        </sc-if>
      </div>
    </div>
    <div style="height:6px;border-radius:6px;background:var(--color-bg-muted);overflow:hidden;margin-top:13px;position:relative;">
      <span style="position:absolute;left:0;top:0;height:100%;width:{{ potentialW }};background:repeating-linear-gradient(45deg,var(--color-approved) 0 4px,transparent 4px 8px);opacity:.35;border-radius:6px;"></span>
      <span style="position:absolute;left:0;top:0;height:100%;width:{{ scoreW }};background:{{ scoreColor }};border-radius:6px;"></span>
    </div>
  </div>

  <!-- why this score -->
  <div style="padding:15px 18px;border-bottom:1px solid var(--color-border-subtle);">
    <div style="font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:7px;">Why this score</div>
    <p style="margin:0;font-size:.85rem;color:var(--color-text-primary);line-height:1.55;">{{ why }}</p>
  </div>

  <!-- AI reasoning -->
  <sc-if value="{{ reasoning }}" hint-placeholder-val="{{ false }}">
  <div style="padding:15px 18px;border-bottom:1px solid var(--color-border-subtle);background:var(--color-bg-subtle);">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;"><span style="width:5px;height:5px;border-radius:50%;background:var(--color-action);"></span><span style="font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);">AI reasoning</span></div>
    <p style="margin:0;font-size:.85rem;color:var(--color-text-secondary);line-height:1.55;">{{ reasoning }}</p>
  </div>
  </sc-if>

  <!-- evidence sources -->
  <sc-if value="{{ hasEvidence }}" hint-placeholder-val="{{ true }}">
  <div style="padding:15px 18px;border-bottom:1px solid var(--color-border-subtle);">
    <div style="font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:10px;">Evidence</div>
    <div style="display:flex;gap:8px;margin-bottom:11px;flex-wrap:wrap;">
      <sc-for list="{{ evidenceImgs }}" as="e" hint-placeholder-count="4">
        <div class="photo" style="background-image:{{ e.img }};width:54px;height:54px;border-radius:var(--image-radius-sm);border:1px solid var(--color-border);"></div>
      </sc-for>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;">
      <sc-for list="{{ evidence }}" as="s" hint-placeholder-count="3">
        <div style="display:flex;gap:8px;font-size:.8rem;color:var(--color-text-secondary);line-height:1.45;"><span style="color:var(--color-text-muted);flex-shrink:0;">·</span><span>{{ s.text }}</span></div>
      </sc-for>
    </div>
  </div>
  </sc-if>

  <!-- suggested improvements -->
  <sc-if value="{{ hasSuggestions }}" hint-placeholder-val="{{ true }}">
  <div style="padding:15px 18px;border-bottom:1px solid var(--color-border-subtle);">
    <div style="font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:10px;">Suggested improvements</div>
    <div style="display:flex;flex-direction:column;gap:9px;">
      <sc-for list="{{ suggestions }}" as="g" hint-placeholder-count="3">
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <span style="width:17px;height:17px;border-radius:5px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          <div style="min-width:0;"><span style="font-size:.82rem;color:var(--color-text-primary);line-height:1.45;">{{ g.text }}</span><span class="mono" style="font-size:.72rem;font-weight:600;color:var(--color-approved);margin-left:6px;">{{ g.gain }}</span></div>
        </div>
      </sc-for>
    </div>
  </div>
  </sc-if>

  <!-- before / after -->
  <sc-if value="{{ hasBeforeAfter }}" hint-placeholder-val="{{ false }}">
  <div style="padding:15px 18px;border-bottom:1px solid var(--color-border-subtle);">
    <div style="font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:10px;">Before / After</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div><div class="photo" style="background-image:{{ beforeImg }};width:100%;aspect-ratio:4/5;border-radius:var(--image-radius-sm);border:1px solid var(--color-border);"></div><div style="font-size:.7rem;color:var(--color-text-muted);margin-top:5px;">Before · {{ score }}</div></div>
      <div><div class="photo" style="background-image:{{ afterImg }};width:100%;aspect-ratio:4/5;border-radius:var(--image-radius-sm);border:1.5px solid var(--color-approved);"></div><div style="font-size:.7rem;color:var(--color-approved);font-weight:600;margin-top:5px;">After · {{ potential }}</div></div>
    </div>
  </div>
  </sc-if>

  <!-- actions -->
  <div style="padding:13px 18px;display:flex;gap:8px;">
    <button onClick="{{ onApprove }}" style="flex:1.3;height:38px;border:none;border-radius:var(--radius-md);background:var(--color-action);color:var(--color-action-text);font-size:.82rem;font-weight:600;cursor:pointer;" style-hover="background:var(--color-action-hover);">Approve fixes</button>
    <button onClick="{{ onImprove }}" style="flex:1;height:38px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-card);color:var(--color-text-primary);font-size:.82rem;font-weight:600;cursor:pointer;" style-hover="background:var(--color-bg-subtle);">Improve</button>
    <button onClick="{{ onRegenerate }}" aria-label="Regenerate" title="Regenerate analysis" style="width:38px;height:38px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-card);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;" style-hover="background:var(--color-bg-subtle);color:var(--color-text-primary);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:640},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Visual identity&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:72,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;potential&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:84,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;confidence&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:88,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;why&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;reasoning&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;evidence&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string[]&quot;},&quot;evidenceImgs&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string[]&quot;},&quot;suggestions&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object[]&quot;},&quot;beforeImg&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;afterImg&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onApprove&quot;:{&quot;editor&quot;:null},&quot;onImprove&quot;:{&quot;editor&quot;:null},&quot;onRegenerate&quot;:{&quot;editor&quot;:null}}">
class Component extends DCLogic {
  renderVals(){
    const p=this.props;
    const score=p.score??72, potential=p.potential??(score+12), confidence=p.confidence??88;
    const col=s=>s>=80?'var(--color-text-primary)':s>=60?'var(--color-warning)':'var(--color-dna-low,#dc2626)';
    const evidence=(p.evidence||[]).map(e=> typeof e==='string'?{text:e}:e);
    const evidenceImgs=(p.evidenceImgs||[]).map(i=> typeof i==='string'?{img:i.startsWith('url')?i:`url("../images/${i}-fashionos.jpeg")`}:i);
    const suggestions=(p.suggestions||[]).map(g=> typeof g==='string'?{text:g,gain:''}:{text:g.text,gain:g.gain?('+'+g.gain):''});
    return {
      title:p.title||'Visual identity',
      score, potential, confidence,
      hasPotential:(p.hasPotential??true) && potential>score,
      scoreColor:col(score), confDot:confidence>=85?'var(--color-approved)':confidence>=70?'var(--color-warning)':'var(--color-text-muted)',
      scoreW:Math.max(0,Math.min(100,score))+'%', potentialW:Math.max(0,Math.min(100,potential))+'%',
      why:p.why||'Visual consistency varies across the brand\u2019s recent imagery \u2014 palette and crop drift from the brandbook on ~1 in 4 assets.',
      reasoning:p.reasoning||'',
      evidence, evidenceImgs, hasEvidence:evidence.length>0||evidenceImgs.length>0,
      suggestions, hasSuggestions:suggestions.length>0,
      hasBeforeAfter:!!(p.beforeImg&&p.afterImg),
      beforeImg:p.beforeImg, afterImg:p.afterImg,
      onApprove:p.onApprove||(()=>{}), onImprove:p.onImprove||(()=>{}), onRegenerate:p.onRegenerate||(()=>{}),
    };
  }
}
</script>
</body>
</html>
