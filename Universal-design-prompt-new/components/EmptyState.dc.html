<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-action:#111;--color-action-hover:#000;--color-action-text:#fff;--radius-md:.625rem;--image-radius:1.25rem;--shadow-card:0 1px 3px rgba(17,17,17,.05),0 1px 2px -1px rgba(17,17,17,.04);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-muted);}
</style>
</helmet>
<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:30px 24px 56px;font-family:'Inter',sans-serif;">
  <sc-if value="{{ hasPreview }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;gap:14px;margin-bottom:24px;opacity:.5;filter:grayscale(.3);">
      <div class="photo" style="background-image:{{ imgA }};width:150px;height:96px;border-radius:var(--image-radius);border:1px solid var(--color-border);transform:rotate(-3deg);box-shadow:var(--shadow-card);"></div>
      <div class="photo" style="background-image:{{ imgB }};width:150px;height:96px;border-radius:var(--image-radius);border:1px solid var(--color-border);transform:translateY(8px);box-shadow:var(--shadow-card);"></div>
      <div class="photo" style="background-image:{{ imgC }};width:150px;height:96px;border-radius:var(--image-radius);border:1px solid var(--color-border);transform:rotate(3deg);box-shadow:var(--shadow-card);"></div>
    </div>
  </sc-if>
  <sc-if value="{{ hasIcon }}" hint-placeholder-val="{{ false }}">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;margin-bottom:20px;color:var(--color-text-muted);">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
  </sc-if>
  <h2 style="margin:0;font-size:1.25rem;font-weight:600;">{{ heading }}</h2>
  <p style="margin:8px 0 0;max-width:430px;font-size:0.875rem;color:var(--color-text-secondary);line-height:1.55;">{{ body }}</p>
  <button style="margin-top:18px;height:42px;padding:0 22px;border:none;border-radius:var(--radius-md);background:var(--color-action);color:var(--color-action-text);font-size:0.875rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;" style-hover="background:var(--color-action-hover);">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>{{ ctaLabel }}
  </button>
  <sc-if value="{{ hasAi }}" hint-placeholder-val="{{ true }}">
    <p style="margin:12px 0 0;font-size:0.75rem;color:var(--color-text-muted);">{{ aiSuggestion }}</p>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:620,&quot;height&quot;:340},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;preview&quot;,&quot;options&quot;:[&quot;preview&quot;,&quot;icon&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;heading&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;No brands yet&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;body&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Add your first brand and I'll crawl it and build a full Brand DNA profile in minutes.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;ctaLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Add brand&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;aiSuggestion&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Brand Intelligence: \&quot;I can crawl your website and build a Brand DNA profile in under 2 minutes.\&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const variant = this.props.variant || 'preview';
    const ai = this.props.aiSuggestion ?? '';
    return {
      hasPreview: variant === 'preview',
      hasIcon: variant === 'icon',
      heading: this.props.heading || 'No items yet',
      body: this.props.body || 'Add your first item to get started.',
      ctaLabel: this.props.ctaLabel || 'Add item',
      hasAi: ai !== '',
      aiSuggestion: ai,
      imgA: `url("../images/${this.props.imgA || '5'}-fashionos.jpeg")`,
      imgB: `url("../images/${this.props.imgB || '8'}-fashionos.jpeg")`,
      imgC: `url("../images/${this.props.imgC || '11'}-fashionos.jpeg")`,
    };
  }
}
</script>
</body>
</html>
