<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--card-radius:1.25rem;--image-scrim:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.4));--shadow-card:0 1px 3px rgba(17,17,17,.05),0 1px 2px -1px rgba(17,17,17,.04);--duration-normal:250ms;--ease-default:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.photo{background-size:cover;background-position:center;background-color:var(--color-bg-muted);position:relative;}
.mono{font-feature-settings:'tnum';}
</style>
</helmet>
<button onClick="{{ onSelect }}" style="text-align:left;width:100%;border:1px solid {{ cardBorder }};background:var(--color-bg-card);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;padding:0;box-shadow:var(--shadow-card);transition:border-color var(--duration-normal) var(--ease-default);display:flex;flex-direction:column;font-family:'Inter',sans-serif;" style-hover="border-color:var(--color-border-strong);">
  <div class="photo" style="background-image:{{ cover }};width:100%;aspect-ratio:16/9;">
    <span style="position:absolute;inset:0;background:var(--image-scrim);"></span>
    <span style="position:absolute;left:11px;bottom:10px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#fff;background:rgba(17,17,17,.5);backdrop-filter:blur(3px);padding:3px 9px;border-radius:999px;"><span style="width:6px;height:6px;border-radius:50%;background:{{ statusDot }};"></span>{{ statusLabel }}</span>
  </div>
  <div style="padding:14px 15px 16px;display:flex;flex-direction:column;flex:1;">
    <div style="font-size:0.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ title }}</div>
    <div class="mono" style="font-size:0.75rem;color:var(--color-text-muted);margin-top:4px;">{{ dates }}</div>
    <div style="margin-top:13px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><span style="font-size:0.75rem;color:var(--color-text-secondary);">{{ delivLabel }}</span><span class="mono" style="font-size:0.75rem;font-weight:600;color:var(--color-text-primary);">{{ pct }}%</span></div>
      <div style="height:5px;border-radius:5px;background:var(--color-bg-muted);overflow:hidden;"><span style="display:block;height:100%;width:{{ pctW }};background:var(--color-text-primary);border-radius:5px;"></span></div>
    </div>
  </div>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:300},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Spring '26&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;dates&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Mar – May 2026&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;deliverables&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:12,&quot;min&quot;:0,&quot;max&quot;:99,&quot;tsType&quot;:&quot;number&quot;},&quot;done&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:8,&quot;min&quot;:0,&quot;max&quot;:99,&quot;tsType&quot;:&quot;number&quot;},&quot;coverKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;11&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Image&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;active&quot;,&quot;options&quot;:[&quot;planning&quot;,&quot;active&quot;,&quot;complete&quot;,&quot;archived&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;coverUrl&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;statusLabel&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;statusDot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;delivLabel&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;pct&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number&quot;},&quot;cardBorder&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const DOT = { planning:'#6b7280', active:'#059669', complete:'#111111', archived:'#9ca3af' };
    const LABEL = { planning:'Planning', active:'Active', complete:'Complete', archived:'Archived' };
    const status = this.props.status || 'active';
    const selected = this.props.selected || false;
    const deliverables = this.props.deliverables ?? 12;
    const done = this.props.done ?? 8;
    const pct = this.props.pct ?? Math.round((done / Math.max(1, deliverables)) * 100);
    return {
      cover: this.props.coverUrl || `url("../images/${this.props.coverKey || '11'}-fashionos.jpeg")`,
      title: this.props.title || "Spring '26",
      dates: this.props.dates || this.props.dateRange || 'Mar – May 2026',
      statusLabel: this.props.statusLabel || LABEL[status] || status,
      statusDot: this.props.statusDot || DOT[status] || DOT.active,
      delivLabel: this.props.delivLabel || `${done}/${deliverables} deliverables`,
      pct,
      pctW: pct + '%',
      cardBorder: this.props.cardBorder || (selected ? 'var(--color-text-primary)' : 'var(--color-border)'),
      onSelect: this.props.onSelect || (() => {}),
    };
  }
}
</script>
</body>
</html>
