<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-muted:#f4f4f5;--color-border:#e5e7eb;--color-text-primary:#111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;--color-approved:#059669;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;color:var(--color-text-primary);}
.mono{font-feature-settings:'tnum';}
</style>
</helmet>
<div style="font-family:'Inter',sans-serif;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
    <span style="font-size:0.9375rem;font-weight:600;">{{ title }}</span>
    <span class="mono" style="font-size:0.75rem;color:var(--color-text-muted);">Step {{ current }} / {{ total }}</span>
  </div>
  <div style="display:flex;gap:5px;">
    <sc-for list="{{ steps }}" as="s" hint-placeholder-count="6">
      <span style="flex:1;height:4px;border-radius:2px;background:{{ s.bg }};"></span>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:56},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Shot list&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;current&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:12,&quot;tsType&quot;:&quot;number&quot;},&quot;total&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:6,&quot;min&quot;:1,&quot;max&quot;:12,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const total = this.props.total ?? 6;
    const current = this.props.current ?? 3;
    const steps = [];
    for (let i = 1; i <= total; i++){
      steps.push({ bg: i <= current ? 'var(--color-text-primary)' : 'var(--color-bg-muted)' });
    }
    return { title: this.props.title || 'Shot list', current, total, steps };
  }
}
</script>
</body>
</html>
