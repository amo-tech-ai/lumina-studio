<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
:root{--color-bg-subtle:#fafafa;--color-bg-muted:#f4f4f5;--image-radius:1.25rem;}
*{box-sizing:border-box;}
body{margin:0;}
@keyframes skl-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skl{background:linear-gradient(90deg,var(--color-bg-subtle) 25%,var(--color-bg-muted) 50%,var(--color-bg-subtle) 75%);background-size:800px 100%;animation:skl-shimmer 1.4s infinite linear;border-radius:10px;}
@media (prefers-reduced-motion:reduce){.skl{animation:none}}
</style>
</helmet>
<sc-if value="{{ isCard }}" hint-placeholder-val="{{ true }}">
  <div style="width:100%;">
    <div class="skl" style="width:100%;aspect-ratio:{{ ratio }};border-radius:var(--image-radius);"></div>
    <div class="skl" style="height:22px;width:42%;margin-top:14px;"></div>
    <div class="skl" style="height:11px;width:80%;margin-top:10px;"></div>
    <div class="skl" style="height:30px;width:100%;margin-top:14px;"></div>
  </div>
</sc-if>
<sc-if value="{{ isImage }}" hint-placeholder-val="{{ false }}">
  <div class="skl" style="width:100%;aspect-ratio:{{ ratio }};border-radius:var(--image-radius);"></div>
</sc-if>
<sc-if value="{{ isLine }}" hint-placeholder-val="{{ false }}">
  <div class="skl" style="height:{{ h }};width:{{ w }};"></div>
</sc-if>
<sc-if value="{{ isAvatar }}" hint-placeholder-val="{{ false }}">
  <div class="skl" style="width:{{ h }};height:{{ h }};border-radius:50%;"></div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:260},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;card&quot;,&quot;options&quot;:[&quot;card&quot;,&quot;image&quot;,&quot;line&quot;,&quot;avatar&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;ratio&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16/9&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Card / Image&quot;},&quot;width&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;100%&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Line&quot;},&quot;height&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;14px&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Line / Avatar&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const variant = this.props.variant || 'card';
    return {
      isCard: variant === 'card',
      isImage: variant === 'image',
      isLine: variant === 'line',
      isAvatar: variant === 'avatar',
      ratio: this.props.ratio || '16/9',
      w: this.props.width || '100%',
      h: this.props.height || '14px',
    };
  }
}
</script>
</body>
</html>
