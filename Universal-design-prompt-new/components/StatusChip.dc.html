<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg-card:#fff;--color-bg-subtle:#fafafa;--color-border:#e5e7eb;--color-text-secondary:#4b5563;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;}
</style>
</helmet>
<span style="display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;{{ wrapStyle }}">
  <span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:{{ dot }};"></span>{{ label }}
</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:170,&quot;height&quot;:44},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;active&quot;,&quot;options&quot;:[&quot;planning&quot;,&quot;active&quot;,&quot;in-production&quot;,&quot;complete&quot;,&quot;draft&quot;,&quot;archived&quot;,&quot;pending&quot;,&quot;new&quot;,&quot;saved&quot;,&quot;invited&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;onImage&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;bare&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const MAP = {
      planning:['Planning','#6b7280'],
      active:['Active','#059669'],
      'in-production':['In Production','#2563eb'],
      complete:['Complete','#111111'],
      draft:['Draft','#9ca3af'],
      archived:['Archived','#9ca3af'],
      pending:['Pending review','#d97706'],
      new:['New','#111111'],
      saved:['Saved','#6b7280'],
      invited:['Invited','#059669'],
    };
    const status = (this.props.status || 'active').toLowerCase();
    const m = MAP[status] || MAP.active;
    const onImage = this.props.onImage || false;
    const bare = this.props.bare || false;
    const pill = 'font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;';
    return {
      label: this.props.label || m[0],
      dot: m[1],
      wrapStyle: bare
        ? 'font-size:0.75rem;font-weight:500;color:var(--color-text-secondary);'
        : onImage
        ? pill + 'color:#fff;background:rgba(17,17,17,.5);backdrop-filter:blur(3px);'
        : pill + 'color:var(--color-text-secondary);background:var(--color-bg-card);border:1px solid var(--color-border);',
    };
  }
}
</script>
</body>
</html>
