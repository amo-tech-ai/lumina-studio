<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --color-bg-page:#ffffff;--color-bg-card:#ffffff;--color-bg-subtle:#fafafa;--color-bg-muted:#f5f5f5;
    --color-border:#e5e7eb;--color-border-strong:#d1d5db;--color-border-subtle:#ededed;
    --color-text-primary:#111111;--color-text-secondary:#4b5563;--color-text-muted:#9ca3af;
    --color-action:#111111;
    --dna-high:#059669;--warning:#f3b93c;--warning-text:#d97706;--approved:#059669;--info:#2563eb;--blocked:#dc2626;
    --nav-active:#f5f5f5;
    --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font-mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --radius-sm:6px;--radius-md:10px;--radius-lg:16px;--radius-xl:20px;--radius-pill:9999px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-bg-subtle);-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:9px;}::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:9px;}
  @keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
</style>
</helmet>
<div style="display:grid;grid-template-columns:56px minmax(0,1fr) 320px;height:100vh;width:100vw;background:var(--color-bg-page);overflow:hidden;">

  <!-- NAV -->
  <nav style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;border-right:1px solid var(--color-border);background:var(--color-bg-card);">
    <div style="width:30px;height:30px;border-radius:8px;background:var(--color-action);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-bottom:14px;">iP</div>
    <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="7">
      <button title="{{ n.label }}" style="{{ n.style }}"><i data-lucide="{{ n.icon }}" style="width:19px;height:19px;"></i></button>
    </sc-for>
    <div style="flex:1;"></div>
    <div style="width:30px;height:30px;border-radius:50%;background-color:var(--color-bg-muted);background-image:{{ avatarBg }};background-size:cover;background-position:center;"></div>
  </nav>

  <!-- WORKSPACE -->
  <main style="display:flex;flex-direction:column;min-width:0;background:var(--color-bg-page);">
    <header style="flex-shrink:0;padding:18px 32px 0;border-bottom:1px solid var(--color-border);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <h1 style="margin:0;font-size:22px;font-weight:700;letter-spacing:-.02em;">Notifications</h1>
          <p style="margin:4px 0 0;font-size:13px;color:var(--color-text-muted);"><span style="font-family:var(--font-mono);color:var(--color-text-primary);font-weight:600;">{{ unreadCount }}</span> unread</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button onClick="{{ markAll }}" style="padding:9px 14px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:#fff;font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer;">Mark all read</button>
          <button onClick="{{ toggleBell }}" title="Notifications panel" style="position:relative;width:40px;height:40px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <i data-lucide="bell" style="width:18px;height:18px;"></i>
            <sc-if value="{{ hasUnread }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;top:7px;right:8px;min-width:15px;height:15px;padding:0 4px;border-radius:999px;background:var(--blocked);color:#fff;font-family:var(--font-mono);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;">{{ unreadCount }}</span></sc-if>
          </button>
        </div>
      </div>
      <div style="display:flex;gap:22px;">
        <sc-for list="{{ filters }}" as="f" hint-placeholder-count="3"><button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button></sc-for>
      </div>
    </header>

    <div style="flex:1;overflow-y:auto;">
      <div style="max-width:720px;margin:0 auto;padding:22px 32px 30px;">
        <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 24px;color:var(--color-text-muted);"><i data-lucide="bell-off" style="width:34px;height:34px;"></i><p style="margin:14px 0 0;font-size:15px;">You're all caught up.</p></div>
        </sc-if>

        <sc-if value="{{ hasToday }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin:0 0 10px;">Today</div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
            <sc-for list="{{ todayRows }}" as="n" hint-placeholder-count="3">
              <button onClick="{{ n.onClick }}" style="{{ n.rowStyle }}">
                <span style="{{ n.iconWrap }}"><i data-lucide="{{ n.icon }}" style="width:16px;height:16px;"></i></span>
                <span style="flex:1;min-width:0;text-align:left;"><span style="display:block;font-size:14px;font-weight:{{ n.weight }};color:var(--color-text-primary);">{{ n.title }}</span><span style="display:block;font-size:12px;color:var(--color-text-secondary);margin-top:1px;">{{ n.sub }}</span></span>
                <span style="font-size:11px;color:var(--color-text-muted);flex-shrink:0;white-space:nowrap;">{{ n.time }}</span>
                <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ true }}"><span style="width:8px;height:8px;border-radius:50%;background:var(--info);flex-shrink:0;"></span></sc-if>
              </button>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ hasEarlier }}" hint-placeholder-val="{{ true }}">
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin:0 0 10px;">Earlier</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <sc-for list="{{ earlierRows }}" as="n" hint-placeholder-count="3">
              <button onClick="{{ n.onClick }}" style="{{ n.rowStyle }}">
                <span style="{{ n.iconWrap }}"><i data-lucide="{{ n.icon }}" style="width:16px;height:16px;"></i></span>
                <span style="flex:1;min-width:0;text-align:left;"><span style="display:block;font-size:14px;font-weight:{{ n.weight }};color:var(--color-text-primary);">{{ n.title }}</span><span style="display:block;font-size:12px;color:var(--color-text-secondary);margin-top:1px;">{{ n.sub }}</span></span>
                <span style="font-size:11px;color:var(--color-text-muted);flex-shrink:0;white-space:nowrap;">{{ n.time }}</span>
                <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ false }}"><span style="width:8px;height:8px;border-radius:50%;background:var(--info);flex-shrink:0;"></span></sc-if>
              </button>
            </sc-for>
          </div>
        </sc-if>
      </div>
    </div>
  </main>

  <!-- INTELLIGENCE PANEL (inbox digest — not chat) -->
  <aside style="display:flex;flex-direction:column;border-left:1px solid var(--color-border);background:var(--color-bg-card);min-width:0;">
    <div style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:16px 18px;border-bottom:1px solid var(--color-border);">
      <i data-lucide="sparkles" style="width:15px;height:15px;color:var(--color-text-primary);"></i>
      <span style="font-size:15px;font-weight:600;">Inbox intelligence</span>
    </div>
    <div style="flex:1;overflow-y:auto;padding:18px;">
      <!-- AI summary -->
      <div style="padding:14px;border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-bg-subtle);">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:8px;">Summary</div>
        <p style="margin:0;font-size:13px;color:var(--color-text-secondary);line-height:1.6;">{{ digestSummary }}</p>
      </div>

      <!-- needs attention -->
      <div style="display:flex;align-items:center;gap:6px;margin:20px 0 10px;"><i data-lucide="alert-circle" style="width:13px;height:13px;color:var(--warning-text);"></i><span style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);">Needs attention</span></div>
      <sc-if value="{{ hasAttention }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <sc-for list="{{ attention }}" as="a" hint-placeholder-count="2">
            <button onClick="{{ a.onClick }}" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border:1px solid var(--color-border);border-left:3px solid {{ a.accent }};border-radius:var(--radius-md);background:var(--color-bg-card);cursor:pointer;font-family:var(--font-sans);text-align:left;">
              <span style="flex:1;min-width:0;"><span style="display:block;font-size:12px;font-weight:600;color:var(--color-text-primary);">{{ a.actionLabel }}</span><span style="display:block;font-size:12px;color:var(--color-text-muted);margin-top:2px;">{{ a.who }}</span></span>
              <i data-lucide="chevron-right" style="width:15px;height:15px;color:var(--color-text-muted);flex-shrink:0;"></i>
            </button>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noAttention }}" hint-placeholder-val="{{ false }}">
        <p style="margin:0;font-size:13px;color:var(--color-text-muted);">Nothing needs action right now.</p>
      </sc-if>

      <!-- at a glance -->
      <div style="height:1px;background:var(--color-border);margin:20px 0;"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:12px;">At a glance</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <sc-for list="{{ glance }}" as="g" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;"><span style="display:flex;align-items:center;gap:8px;color:var(--color-text-secondary);"><span style="width:8px;height:8px;border-radius:50%;background:{{ g.color }};"></span>{{ g.label }}</span><span style="font-family:var(--font-mono);font-weight:600;">{{ g.count }}</span></div>
        </sc-for>
      </div>
    </div>
    <div style="flex-shrink:0;padding:12px 18px;border-top:1px solid var(--color-border);display:flex;align-items:center;gap:7px;">
      <span style="width:7px;height:7px;border-radius:50%;background:var(--color-text-muted);"></span>
      <span style="font-size:11px;color:var(--color-text-muted);">notification agent · idle</span>
    </div>
  </aside>

  <!-- BELL SLIDE-OVER PANEL -->
  <sc-if value="{{ bellOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;inset:0;z-index:60;">
      <div onClick="{{ toggleBell }}" style="position:absolute;inset:0;background:rgba(17,17,17,.35);"></div>
      <div style="position:absolute;top:0;right:0;height:100%;width:380px;background:var(--color-bg-card);border-left:1px solid var(--color-border);display:flex;flex-direction:column;animation:slideIn .25s cubic-bezier(0.16,1,0.3,1);">
        <div style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--color-border);">
          <span style="font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;"><i data-lucide="bell" style="width:16px;height:16px;"></i>Notifications</span>
          <button onClick="{{ toggleBell }}" style="border:none;background:none;cursor:pointer;"><i data-lucide="x" style="width:17px;height:17px;color:var(--color-text-muted);"></i></button>
        </div>
        <div style="flex:1;overflow-y:auto;padding:14px;">
          <sc-for list="{{ allRows }}" as="n" hint-placeholder-count="4">
            <button onClick="{{ n.onClick }}" style="{{ n.rowStyle }}">
              <span style="{{ n.iconWrap }}"><i data-lucide="{{ n.icon }}" style="width:15px;height:15px;"></i></span>
              <span style="flex:1;min-width:0;text-align:left;"><span style="display:block;font-size:13px;font-weight:{{ n.weight }};color:var(--color-text-primary);">{{ n.title }}</span><span style="display:block;font-size:11px;color:var(--color-text-muted);margin-top:1px;">{{ n.time }}</span></span>
              <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ true }}"><span style="width:8px;height:8px;border-radius:50%;background:var(--info);flex-shrink:0;"></span></sc-if>
            </button>
          </sc-for>
        </div>
        <div style="flex-shrink:0;padding:12px 18px;border-top:1px solid var(--color-border);"><button onClick="{{ markAll }}" style="width:100%;padding:9px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:#fff;font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer;">Mark all read</button></div>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:840}}">
class Component extends DCLogic {
  state = { filter:'all', read:{}, bellOpen:false };

  componentDidMount(){ this._icons(); this._onKey=(e)=>{ if(e.key==='Escape'&&this.state.bellOpen) this.setState({bellOpen:false}); }; window.addEventListener('keydown',this._onKey); }
  componentWillUnmount(){ window.removeEventListener('keydown',this._onKey); }
  componentDidUpdate(){ this._icons(); }
  _icons(){ let t=0; const run=()=>{ if(window.lucide&&window.lucide.createIcons)window.lucide.createIcons(); else if(t++<40)setTimeout(run,80); }; run(); }

  _open(n){
    this.setState(s=>({ read:{...s.read,[n.id]:true}, bellOpen:false }));
    if(n.href) setTimeout(()=>{ window.location.href=n.href; }, 120);
  }

  renderVals(){
    const nav=[
      {icon:'layout-dashboard',label:'Command Center'},{icon:'building-2',label:'Brands'},
      {icon:'camera',label:'Shoots'},{icon:'megaphone',label:'Campaigns'},{icon:'images',label:'Assets'},
      {icon:'shuffle',label:'Matching'},{icon:'bell',label:'Notifications',active:true}
    ].map(n=>({...n,style:'width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;'+(n.active?'background:var(--nav-active);color:var(--color-text-primary);':'background:transparent;color:var(--color-text-muted);')}));

    const BD='../../../Shoot Detail.v2.image-first.dc.html';
    const TP='SCR-20-Talent-Profile.dc.html';
    // kind → icon + accent
    const K={
      requested:['send','var(--warning)','var(--warning-text)'],
      approved:['check-circle','var(--info)','var(--info)'],
      confirmed:['check-circle-2','var(--approved)','var(--approved)'],
      declined:['x-circle','var(--blocked)','var(--blocked)'],
      reschedule:['calendar-clock','var(--warning)','var(--warning-text)'],
      match:['sparkles','var(--color-action)','var(--color-text-primary)'],
      review:['star','var(--warning)','var(--warning-text)'],
      expired:['clock','var(--color-text-muted)','var(--color-text-muted)']
    };
    const raw=[
      {id:'n1',kind:'confirmed',title:'Booking confirmed — @runwithkara',sub:'Nike SS26 · added to shoot crew',time:'9m',group:'today',href:BD+'?flow=booking&talent=runwithkara&status=confirmed'},
      {id:'n2',kind:'approved',title:'You approved @lena.moves',sub:'Nike SS26 · ready to confirm',time:'1h',group:'today',href:BD+'?flow=booking&talent=lena&status=approved'},
      {id:'n3',kind:'requested',title:'Booking request sent — @the_daily_athlete',sub:'Awaiting response · expires in 72h',time:'2h',group:'today',href:BD+'?flow=booking&talent=daily&status=requested'},
      {id:'n4',kind:'match',title:'3 new talent matches for Nike',sub:'Top: @studio.mira — 86% fit',time:'4h',group:'today',href:'SCR-09-Matching-Talent.dc.html'},
      {id:'n5',kind:'reschedule',title:'@nikestylegram proposed new dates',sub:'Mar 18–20 instead of Mar 12–14',time:'Yesterday',group:'earlier',href:BD+'?flow=booking&talent=nikefan&status=quoted'},
      {id:'n6',kind:'declined',title:'@marcus.frames declined',sub:'Unavailable for the requested dates',time:'2d',group:'earlier',href:BD+'?flow=booking&talent=marcus&status=declined'},
      {id:'n7',kind:'review',title:'New review — @runwithkara',sub:'Nike left a 5.0 rating',time:'3d',group:'earlier',href:TP},
      {id:'n8',kind:'expired',title:'Request expired — @cityrunner_jo',sub:'No response within 72h',time:'4d',group:'earlier',href:BD+'?flow=booking&talent=cityjo&status=requested'}
    ];

    const isRead=n=> !!this.state.read[n.id];
    const passFilter=n=> this.state.filter==='all' ? true : this.state.filter==='unread' ? !isRead(n) : ['requested','approved','confirmed','declined','reschedule','expired'].includes(n.kind);
    const decorate=n=>{ const k=K[n.kind]||K.match; const unread=!isRead(n);
      return {...n, icon:k[0], unread, weight:unread?'600':'500',
        iconWrap:'width:34px;height:34px;flex-shrink:0;border-radius:9px;background:'+(unread?'var(--color-bg-subtle)':'var(--color-bg-muted)')+';color:'+k[2]+';display:flex;align-items:center;justify-content:center;',
        rowStyle:'display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border:1px solid var(--color-border);border-radius:14px;background:'+(unread?'var(--color-bg-card)':'var(--color-bg-subtle)')+';cursor:pointer;font-family:var(--font-sans);text-align:left;',
        onClick:()=>this._open(n)};
    };

    const visible=raw.filter(passFilter).map(decorate);
    const todayRows=visible.filter(n=>n.group==='today');
    const earlierRows=visible.filter(n=>n.group==='earlier');
    const unreadCount=raw.filter(n=>!isRead(n)).length;

    const filters=[['all','All'],['unread','Unread'],['bookings','Bookings']].map(([k,label])=>{
      const on=this.state.filter===k;
      return { label, onClick:()=>this.setState({filter:k}),
        style:'background:none;border:none;cursor:pointer;font-family:var(--font-sans);font-size:14px;padding:0 0 12px;'+(on?'color:var(--color-text-primary);font-weight:600;border-bottom:2px solid var(--color-text-primary);':'color:var(--color-text-muted);font-weight:500;border-bottom:2px solid transparent;') };
    });

    // ---- inbox intelligence digest ----
    const actionKinds={approved:'Ready to confirm',reschedule:'New dates proposed',requested:'Awaiting response'};
    const attention=raw.filter(n=>actionKinds[n.kind]&&!isRead(n)).map(n=>{ const k=K[n.kind]||K.match;
      return {...n, actionLabel:actionKinds[n.kind], who:n.title.replace(/^[^—]*—\s*/,'').replace(/^You approved\s*/,'').replace(/\s*proposed new dates$/,''), accent:k[2], onClick:()=>this._open(n)}; });
    const cnt=k=>raw.filter(n=>n.kind===k&&!isRead(n)).length;
    const needAction=attention.length;
    const digestSummary=(unreadCount===0?'You\u2019re all caught up.':
      unreadCount+' unread'+(needAction>0?' \u00b7 '+needAction+' need your action':'')+(cnt('confirmed')>0?' \u00b7 '+cnt('confirmed')+' just confirmed':'')+'.');
    const glance=[
      {label:'Bookings confirmed',count:cnt('confirmed'),color:'var(--approved)'},
      {label:'Awaiting your action',count:needAction,color:'var(--warning)'},
      {label:'New talent matches',count:cnt('match'),color:'var(--color-text-primary)'}
    ];

    return {
      navItems:nav, avatarBg:'url("../images/24-fashionos.jpeg")',
      filters,
      todayRows, earlierRows, allRows:visible,
      hasToday:todayRows.length>0, hasEarlier:earlierRows.length>0, isEmpty:visible.length===0,
      unreadCount, hasUnread:unreadCount>0,
      digestSummary, attention, hasAttention:attention.length>0, noAttention:attention.length===0, glance,
      bellOpen:this.state.bellOpen, toggleBell:()=>this.setState(s=>({bellOpen:!s.bellOpen})),
      markAll:()=>{ const r={}; raw.forEach(n=>r[n.id]=true); this.setState({read:r}); }
    };
  }
}
</script>
</body>
</html>
