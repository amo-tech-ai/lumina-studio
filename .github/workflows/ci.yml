name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs for the same ref so rapid pushes don't pile up runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Env guard (check:env)
        run: npm run check:env

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npm run test

  # Next.js operator app (app/) — vendored standalone project with its own
  # package-lock + ESLint flat config. Validated independently so a Vite env
  # error never blocks this job (or vice-versa). No real secrets required:
  # the build is static + the Mastra registry guard only checks agent keys,
  # not API key values.
  app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build first: `next build` generates next-env.d.ts + .next/types, so the
      # subsequent tsc --noEmit is reliable on a clean checkout (and build itself
      # type-checks app code since next.config.ts has no ignoreBuildErrors).
      - name: Production build
        run: npm run build

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test
