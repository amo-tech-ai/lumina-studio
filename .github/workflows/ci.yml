name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs for the same ref so rapid pushes don't pile up runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # WEB-015.1 (IPI2-160) — proves the chatbot/lead-draft RLS + claim_lead_draft
  # behavior on an ephemeral Postgres (run.sh spins postgres:16, applies only this
  # migration — not a full historical replay). Independent of build so a Docker
  # hiccup never blocks the unit pipeline. ubuntu-latest ships Docker.
  supabase-web015:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker is available
        run: docker info >/dev/null

      - name: WEB-015 RLS + claim_lead_draft tests
        run: npm run test:web015

  # Cloudflare Worker AI Gateway (services/cloudflare-worker/) — tests Bearer token
  # authentication and error classification with explicit BEARER_TOKEN injection.
  # Prevents auth bypass bugs from shipping (e.g., IPI-468 whitespace handling).
  # Runs independently so Worker code quality is always verified, even if app/ changes.
  cloudflare-worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/cloudflare-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Bearer token + error classification tests
        env:
          # Inject explicit token for CI to test real auth paths (not dev-mode bypass).
          # Local dev uses .dev.vars with AI_GATEWAY_ALLOW_UNAUTHENTICATED=true;
          # CI must test actual token validation to catch bugs like IPI-468.
          AI_GATEWAY_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_TEST_TOKEN || 'test-token-ci' }}
        run: npm test

  # Next.js operator app (app/) — standalone project with its own
  # package-lock + ESLint flat config. No real secrets required:
  # the build is static + the Mastra registry guard only checks agent keys,
  # not API key values.
  app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # IPI-476 · PLAN-VERIFY-002 — Node 22 (native WebSocket; matches booking-gate)
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Fail fast if a server secret leaked into client code (app/src). Runs from
      # repo root since the scanner lives there; pure Node stdlib, no install needed.
      - name: Env guard (client secret scan)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-client-env.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build first: `next build` generates next-env.d.ts + .next/types, so the
      # subsequent tsc --noEmit is reliable on a clean checkout (and build itself
      # type-checks app code since next.config.ts has no ignoreBuildErrors).
      - name: Production build
        run: npm run build

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

  # IPI-347 · Model Gate capstone — remote SQL + RLS when DATABASE_URL secret is set.
  # secrets.* cannot gate job-level if: — use a probe job (actions/runner#520).
  booking-gate-check:
    runs-on: ubuntu-latest
    outputs:
      db_configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        shell: bash
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

  booking-gate:
    needs: booking-gate-check
    if: needs.booking-gate-check.outputs.db_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # @supabase/supabase-js's realtime-js client requires native WebSocket
      # support (stable from Node 22) — this job constructs a real
      # createClient() against the live project, unlike the other jobs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install root dependencies (scripts/verify-rls.mjs needs @supabase/supabase-js)
        run: npm ci --omit=dev

      - name: Install app dependencies (typecheck + API tests in gate script)
        working-directory: app
        run: npm ci

      - name: Model Gate verification
        env:
          REQUIRE_BOOKING_SQL: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run supabase:verify-booking-gate

      # IPI-476 · PLAN-CI-001 — planner scenario + Realtime (needs Node 22 WebSocket)
      - name: Planner scenario + Realtime verification
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run supabase:verify-planner
