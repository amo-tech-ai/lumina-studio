name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs for the same ref so rapid pushes don't pile up runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # WEB-015.1 (IPI2-160) — proves the chatbot/lead-draft RLS + claim_lead_draft
  # behavior on an ephemeral Postgres (run.sh spins postgres:16, applies only this
  # migration — not a full historical replay). Independent of build so a Docker
  # hiccup never blocks the unit pipeline. ubuntu-latest ships Docker.
  supabase-web015:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker is available
        run: docker info >/dev/null

      - name: WEB-015 RLS + claim_lead_draft tests
        run: npm run test:web015

  # Next.js operator app (app/) — standalone project with its own
  # package-lock + ESLint flat config. No real secrets required:
  # the build is static + the Mastra registry guard only checks agent keys,
  # not API key values.
  app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # IPI-625 · CF-BASE-001 — Node 22 is the iPix toolchain standard (CI parity with
      # booking-gate / planner verify). Wrangler supports maintained Node releases; 22 is
      # not a universal Cloudflare platform requirement.
      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Fail fast if a server secret leaked into client code (app/src). Runs from
      # repo root since the scanner lives there; pure Node stdlib, no install needed.
      - name: Env guard (client secret scan)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-client-env.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # IPI-625 · CF-BASE-001 — cloudflare-env.d.ts is gitignored; generate binding-only
      # types from wrangler.jsonc on every clean checkout, then compile. Do not use
      # check:cf-types alone unless the generated file is committed.
      - name: Cloudflare binding typegen (cf-typegen)
        run: npm run cf-typegen

      # Build first: `next build` generates next-env.d.ts + .next/types for tsc.
      - name: Production build
        run: npm run build

      - name: Type-check (npm run typecheck)
        run: npm run typecheck

      # IPI-472 · INFRA-001 — verify wrangler.jsonc matches generated binding types.
      - name: Cloudflare binding types check (check:cf-types)
        run: npm run check:cf-types

      - name: Unit tests
        run: npm run test

      # IPI-472 · INFRA-001 — OpenNext Worker build + dry-run gzip gate (8.5 warn / 9.0 fail MiB).
      # Placeholder public Supabase vars — sufficient for bundle gate; fork PRs lack repo secrets.
      - name: OpenNext Cloudflare build + bundle gate (build:cf)
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        run: npm run build:cf

  # IPI-763 · CF-CI-001 — the custom AI Gateway Worker (services/cloudflare-worker/)
  # is frozen for new features but still carries real production AI traffic
  # (see tasks/cloudflare/todo.md decision log, 2026-07-14) until IPI-592 deletes
  # it. Its 98-test @cloudflare/vitest-pool-workers suite runs fully local via
  # Miniflare — no CLOUDFLARE_API_TOKEN, account ID, or Wrangler auth needed
  # (https://developers.cloudflare.com/workers/testing/vitest-integration/).
  # No path filter, same as every other job in this file — a required check
  # gated on changed paths can go permanently "pending" on PRs that never
  # touch it and block merges (GitHub Actions required-status-check trap).
  cloudflare-worker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/cloudflare-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Worker tests (Vitest + vitest-pool-workers, local Miniflare)
        run: npm test

  # IPI-347 · Model Gate capstone — remote SQL + RLS when DATABASE_URL secret is set.
  # secrets.* cannot gate job-level if: — use a probe job (actions/runner#520).
  booking-gate-check:
    runs-on: ubuntu-latest
    outputs:
      db_configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        shell: bash
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

  booking-gate:
    needs: booking-gate-check
    if: needs.booking-gate-check.outputs.db_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # @supabase/supabase-js's realtime-js client requires native WebSocket
      # support (stable from Node 22) — this job constructs a real
      # createClient() against the live project, unlike the other jobs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install root dependencies (scripts/verify-rls.mjs needs @supabase/supabase-js)
        run: npm ci --omit=dev

      - name: Install app dependencies (typecheck + API tests in gate script)
        working-directory: app
        run: npm ci

      - name: Model Gate verification
        env:
          REQUIRE_BOOKING_SQL: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run supabase:verify-booking-gate

      # IPI-476 · PLAN-CI-001 — planner scenario + Realtime (needs Node 22 WebSocket)
      - name: Planner scenario + Realtime verification
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run supabase:verify-planner

  # IPI-674 · QA-SHOOT-001 — real-browser proof of the Shoot Wizard happy path.
  # Every AI/workflow/commit call is intercepted (see e2e/08-shoot-wizard.spec.ts),
  # but login is real, so a real QA_PASSWORD is required. This job fails loudly
  # if that secret is missing rather than letting the suite report a quiet,
  # misleadingly-green "skipped" run.
  shoot-wizard-e2e:
    runs-on: ubuntu-latest
    # Fork PRs never receive repo secrets (GitHub platform behavior, not
    # something a workflow can opt into) — skip cleanly for them instead of
    # hard-failing every external/Dependabot PR on a secret they can never
    # have. Same-repo pushes and PRs still run and still hard-fail below if
    # QA_PASSWORD is missing there, where it's expected to be configured.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Verify QA credentials are configured
        # Read the secret through env, not interpolated directly into the
        # shell script via ${{ }} — a value containing $, quotes, or other
        # shell metacharacters would otherwise be re-expanded/reparsed by
        # the shell before this check runs (e.g. a password starting with
        # "$" could look empty), giving a false "missing" failure or worse.
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: |
          if [ -z "$QA_PASSWORD" ]; then
            echo "::error::QA_PASSWORD secret is not set — failing rather than letting this job silently skip the real login."
            exit 1
          fi

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Shoot Wizard e2e (chromium-desktop)
        # Least privilege: QA_PASSWORD + the public anon key/URL are all a
        # real client-side login needs. Every AI/workflow/commit/brand-read
        # call this spec makes is intercepted via page.route(), so the app
        # never exercises a server-side DB path — no service-role key or
        # direct DB connection string belongs in this job.
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test e2e/08-shoot-wizard.spec.ts --project=chromium-desktop

      - name: Upload failure evidence (screenshots + traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shoot-wizard-e2e-failure
          path: test-results/
          retention-days: 7

  # IPI-701 · QA-PREVIEW-001 — real-browser proof of the Channel Preview
  # read path. Unlike shoot-wizard-e2e, this page makes zero client-side
  # network calls: getAllChannelSpecs() runs server-side during SSR, so
  # there's nothing to mock and no mutation risk — this spec deliberately
  # exercises the real Supabase-backed query end to end. Same QA_PASSWORD
  # fail-loud contract as shoot-wizard-e2e (see comment above).
  channel-preview-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Verify QA credentials are configured
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: |
          if [ -z "$QA_PASSWORD" ]; then
            echo "::error::QA_PASSWORD secret is not set — failing rather than letting this job silently skip the real login."
            exit 1
          fi

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Channel Preview e2e (chromium-desktop)
        # Least privilege: QA_PASSWORD + the public anon key/URL are all a
        # real client-side login needs. getAllChannelSpecs() reads through
        # the anon key + the authenticated session cookie under RLS — no
        # service-role key or direct DB connection string belongs here.
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test e2e/09-channel-preview.spec.ts --project=chromium-desktop

      - name: Upload failure evidence (screenshots + traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: channel-preview-e2e-failure
          path: test-results/
          retention-days: 7
