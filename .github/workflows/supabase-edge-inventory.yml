# IPI-689 · SB-EDGE-006 — Edge inventory: repo ↔ config.toml ↔ remote.
# Always starts (no workflow-level paths:) so a required check never stays Pending.
# Remote drift can appear via Dashboard/CLI with zero repo file changes — do not
# path-filter the remote job on supabase/functions/**.
# Inventory only — never `supabase functions deploy --prune`.
name: Supabase Edge inventory

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily UTC — catches Dashboard/CLI remote drift without a PR.
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-edge-inventory-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR + every run: secretless repo dirs ↔ config.toml verify_jwt + self-check.
  edge-inventory-local:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Self-check (fake local + fake remote mismatches must fail)
        run: node scripts/check-edge-inventory.mjs --self-check

      - name: Local inventory (repo ↔ config.toml)
        run: node scripts/check-edge-inventory.mjs

  # Remote inventory: schedule / main / workflow_dispatch only (needs token).
  secrets-preflight:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  edge-inventory-remote:
    needs: secrets-preflight
    if: needs.secrets-preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: supabase/setup-cli@v1
        with:
          # Pin matches IPI-665 linked gates (structured JSON list).
          version: 2.109.1

      - name: Fetch remote functions inventory (JSON)
        run: |
          set -euo pipefail
          supabase functions list \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --output-format json \
            > /tmp/edge-functions-remote.json
          test -s /tmp/edge-functions-remote.json
          head -c 200 /tmp/edge-functions-remote.json
          echo

      - name: Remote inventory (repo ↔ config.toml ↔ Management API)
        run: |
          node scripts/check-edge-inventory.mjs \
            --remote \
            --remote-json /tmp/edge-functions-remote.json

  edge-inventory-remote-secrets-missing:
    needs: secrets-preflight
    if: needs.secrets-preflight.outputs.configured != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Secrets missing for remote inventory
        run: |
          echo "::error::IPI-689 remote inventory requires secret SUPABASE_ACCESS_TOKEN and variable SUPABASE_PROJECT_ID on schedule/main/workflow_dispatch."
          exit 1

  # Required-check safe: always completes (success when skipped jobs OK; fails on red).
  supabase-edge-inventory:
    needs:
      [
        edge-inventory-local,
        secrets-preflight,
        edge-inventory-remote,
        edge-inventory-remote-secrets-missing,
      ]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Summarize Edge inventory gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          LOCAL_RESULT: ${{ needs.edge-inventory-local.result }}
          PREFLIGHT_RESULT: ${{ needs.secrets-preflight.result }}
          REMOTE_RESULT: ${{ needs.edge-inventory-remote.result }}
          REMOTE_MISSING_RESULT: ${{ needs.edge-inventory-remote-secrets-missing.result }}
          CONFIGURED: ${{ needs.secrets-preflight.outputs.configured }}
        run: |
          set -euo pipefail
          if [ "$LOCAL_RESULT" != "success" ]; then
            echo "::error::edge-inventory-local failed (result=$LOCAL_RESULT)."
            exit 1
          fi

          remote_eligible=false
          if [ "$EVENT_NAME" = "schedule" ] \
            || [ "$EVENT_NAME" = "workflow_dispatch" ] \
            || { [ "$EVENT_NAME" = "push" ] && [ "$REF" = "refs/heads/main" ]; }; then
            remote_eligible=true
          fi

          if [ "$remote_eligible" != "true" ]; then
            echo "PR/non-main event — secretless local inventory passed (remote skipped)."
            exit 0
          fi

          if [ "$PREFLIGHT_RESULT" != "success" ]; then
            echo "::error::secrets-preflight did not succeed (result=$PREFLIGHT_RESULT)."
            exit 1
          fi

          if [ "${CONFIGURED:-}" = "true" ]; then
            case "$REMOTE_RESULT" in
              success)
                echo "Remote Edge inventory aligned."
                exit 0
                ;;
              *)
                echo "::error::edge-inventory-remote failed (result=$REMOTE_RESULT)."
                exit 1
                ;;
            esac
          fi

          echo "::error::Remote inventory secrets missing (remote-secrets-missing result=$REMOTE_MISSING_RESULT)."
          exit 1
