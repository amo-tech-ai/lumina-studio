# IPI-472 + IPI-606 — Preview Worker bootstrap (manual)
#
# Correct order (OpenNext):
#   build:cf → deploy Worker (first bootstrap) → sync runtime secrets → (IPI-632 smoke separately)
#
# dry_run=true: validate pairing + list secret names only (no build/deploy/sync).
# dry_run=false: full bootstrap — deploy creates Worker if missing, then attaches secrets.
#
# Docs: app/docs/infisical-cloudflare-secrets.md · app/docs/opennext-ci.md

name: Cloudflare secrets sync

on:
  workflow_dispatch:
    inputs:
      secret_source:
        description: Where runtime secret values come from
        required: true
        type: choice
        options:
          - github
          - infisical-oidc
      infisical_env:
        description: Infisical env slug (dev | staging | prod) — pairing label for github/infisical
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      wrangler_env:
        description: Wrangler environment (preview | production)
        required: true
        type: choice
        options:
          - preview
          - production
      dry_run:
        description: Dry run (names only — skip build, deploy, and wrangler sync)
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  preview-bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      INFISICAL_ENV: ${{ inputs.infisical_env }}
      WRANGLER_ENV: ${{ inputs.wrangler_env }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Infisical ↔ wrangler env pairing
        run: node scripts/validate-env-pair.mjs

      # --- Live bootstrap (skipped on dry_run) -----------------------------------
      - name: Cloudflare binding typegen (cf-typegen)
        if: inputs.dry_run == false
        run: npm run cf-typegen

      - name: OpenNext build (build:cf)
        if: inputs.dry_run == false
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build:cf

      # Bootstrap uses deploy (not upload): opennextjs-cloudflare upload wraps
      # wrangler versions upload, which fails when the Worker does not yet exist.
      # deploy creates ipix-operator-preview on first run; subsequent CI may use upload.
      - name: Deploy Worker (opennextjs-cloudflare deploy)
        if: inputs.dry_run == false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "$WRANGLER_ENV" = "preview" ]; then
            npx opennextjs-cloudflare deploy --env preview
          else
            npx opennextjs-cloudflare deploy --env production
          fi

      # --- Runtime secret sync (dry_run or live) --------------------------------
      - name: Sync runtime secrets from GitHub Actions secrets
        if: inputs.secret_source == 'github'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_NOTIFICATION_API_SECRET: ${{ secrets.CLOUDINARY_NOTIFICATION_API_SECRET }}
          COPILOTKIT_LICENSE_TOKEN: ${{ secrets.COPILOTKIT_LICENSE_TOKEN }}
          INTELLIGENCE_API_KEY: ${{ secrets.INTELLIGENCE_API_KEY }}
          INTELLIGENCE_API_URL: ${{ secrets.INTELLIGENCE_API_URL }}
          INTELLIGENCE_GATEWAY_WS_URL: ${{ secrets.INTELLIGENCE_GATEWAY_WS_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          INTERNAL_WEBHOOK_SECRET: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}
        run: |
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"

      - name: Authenticate to Infisical (OIDC)
        if: inputs.secret_source == 'infisical-oidc' && vars.INFISICAL_IDENTITY_ID != ''
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}

      - name: Sync runtime secrets to Cloudflare (OIDC)
        if: inputs.secret_source == 'infisical-oidc' && vars.INFISICAL_IDENTITY_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"
