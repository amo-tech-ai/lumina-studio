# IPI-472 + IPI-606 — Worker bootstrap (manual)
#
# Correct order (OpenNext + secrets.required):
#   validate → fetch secrets → build:cf → upload+secrets-file (one version) → record version ID
#
# dry_run=true: validate pairing + list secret names only (no build/upload).
# dry_run=false: full bootstrap — code and runtime secrets in a single Worker version.
#
# IPI-632 smoke validation runs separately after preview URL exists.
#
# Docs: app/docs/infisical-cloudflare-secrets.md · app/docs/opennext-ci.md

name: Cloudflare secrets sync

on:
  workflow_dispatch:
    inputs:
      secret_source:
        description: Where runtime secret values come from
        required: true
        type: choice
        options:
          - github
          - infisical-oidc
      infisical_env:
        description: Infisical env slug (dev | staging | prod) — pairing label for github/infisical
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      wrangler_env:
        description: Wrangler environment (preview | production)
        required: true
        type: choice
        options:
          - preview
          - production
      dry_run:
        description: Dry run (names only — skip build, upload, and wrangler sync)
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  worker-bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ inputs.wrangler_env }}
    defaults:
      run:
        working-directory: app
    env:
      INFISICAL_ENV: ${{ inputs.infisical_env }}
      WRANGLER_ENV: ${{ inputs.wrangler_env }}
      DRY_RUN: ${{ inputs.dry_run }}
      SECRET_SOURCE: ${{ inputs.secret_source }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Infisical ↔ wrangler env pairing
        run: node scripts/validate-env-pair.mjs

      - name: Validate Infisical OIDC configuration
        run: node scripts/validate-infisical-oidc-config.mjs

      - name: Authenticate to Infisical (OIDC)
        if: inputs.secret_source == 'infisical-oidc'
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}

      # --- Dry run: names only (no build/upload) ---------------------------------
      - name: Dry-run secret allowlist (GitHub source)
        if: inputs.secret_source == 'github' && inputs.dry_run == true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_NOTIFICATION_API_SECRET: ${{ secrets.CLOUDINARY_NOTIFICATION_API_SECRET }}
          COPILOTKIT_LICENSE_TOKEN: ${{ secrets.COPILOTKIT_LICENSE_TOKEN }}
          INTELLIGENCE_API_KEY: ${{ secrets.INTELLIGENCE_API_KEY }}
          INTELLIGENCE_API_URL: ${{ secrets.INTELLIGENCE_API_URL }}
          INTELLIGENCE_GATEWAY_WS_URL: ${{ secrets.INTELLIGENCE_GATEWAY_WS_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          INTERNAL_WEBHOOK_SECRET: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}
        run: |
          node scripts/upload-opennext-with-secrets.mjs \
            --infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV" --dry-run

      - name: Dry-run secret allowlist (Infisical OIDC)
        if: inputs.secret_source == 'infisical-oidc' && inputs.dry_run == true
        run: |
          node scripts/upload-opennext-with-secrets.mjs \
            --infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV" --dry-run

      # --- Live bootstrap (skipped on dry_run) -----------------------------------
      - name: Cloudflare binding typegen (cf-typegen)
        if: inputs.dry_run == false
        run: npm run cf-typegen

      - name: OpenNext build (build:cf)
        if: inputs.dry_run == false
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build:cf

      # Code + runtime secrets in one version (wrangler --secrets-file passthrough).
      # Greenfield: script falls back to deploy when Worker script does not exist yet.
      - name: Upload Worker with runtime secrets (GitHub source)
        if: inputs.dry_run == false && inputs.secret_source == 'github'
        id: upload_github
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_NOTIFICATION_API_SECRET: ${{ secrets.CLOUDINARY_NOTIFICATION_API_SECRET }}
          COPILOTKIT_LICENSE_TOKEN: ${{ secrets.COPILOTKIT_LICENSE_TOKEN }}
          INTELLIGENCE_API_KEY: ${{ secrets.INTELLIGENCE_API_KEY }}
          INTELLIGENCE_API_URL: ${{ secrets.INTELLIGENCE_API_URL }}
          INTELLIGENCE_GATEWAY_WS_URL: ${{ secrets.INTELLIGENCE_GATEWAY_WS_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          INTERNAL_WEBHOOK_SECRET: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}
        run: |
          set -o pipefail
          OUTPUT=$(node scripts/upload-opennext-with-secrets.mjs \
            --infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV" 2>&1 | tee /dev/stderr)
          VERSION_ID=$(echo "$OUTPUT" | sed -n 's/^worker_version_id=//p' | tail -1)
          PREVIEW_URL=$(echo "$OUTPUT" | sed -n 's/^preview_url=//p' | tail -1)
          echo "worker_version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload Worker with runtime secrets (Infisical OIDC)
        if: inputs.dry_run == false && inputs.secret_source == 'infisical-oidc'
        id: upload_infisical
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          OUTPUT=$(node scripts/upload-opennext-with-secrets.mjs \
            --infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV" 2>&1 | tee /dev/stderr)
          VERSION_ID=$(echo "$OUTPUT" | sed -n 's/^worker_version_id=//p' | tail -1)
          PREVIEW_URL=$(echo "$OUTPUT" | sed -n 's/^preview_url=//p' | tail -1)
          echo "worker_version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Record bootstrap artifacts for IPI-632
        if: inputs.dry_run == false
        run: |
          VERSION_ID="${{ steps.upload_github.outputs.worker_version_id || steps.upload_infisical.outputs.worker_version_id }}"
          PREVIEW_URL="${{ steps.upload_github.outputs.preview_url || steps.upload_infisical.outputs.preview_url }}"
          {
            echo "## Worker bootstrap (${{ inputs.wrangler_env }})"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Wrangler env | \`${{ inputs.wrangler_env }}\` |"
            echo "| Worker version ID | \`${VERSION_ID:-see logs}\` |"
            echo "| Preview URL | ${PREVIEW_URL:-see wrangler output} |"
            echo ""
            echo "Next: IPI-632 protected preview smoke on the preview URL above."
          } >> "$GITHUB_STEP_SUMMARY"
