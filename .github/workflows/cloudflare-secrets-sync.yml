# IPI-606 · CF-SEC-010 — Runtime secret sync to Cloudflare (manual v1)
#
# workflow_dispatch only. Secret source: GitHub Actions secrets (bootstrap) or Infisical OIDC.
# Does NOT auto-sync production on every PR.
#
# Docs: app/docs/infisical-cloudflare-secrets.md

name: Cloudflare secrets sync

on:
  workflow_dispatch:
    inputs:
      secret_source:
        description: Where runtime secret values come from
        required: true
        type: choice
        options:
          - github
          - infisical-oidc
      infisical_env:
        description: Infisical environment slug (dev | staging | prod) — pairing label when using github or infisical
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      wrangler_env:
        description: Wrangler environment (preview | production)
        required: true
        type: choice
        options:
          - preview
          - production
      dry_run:
        description: Dry run (print secret names only)
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  sync-runtime-secrets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      INFISICAL_ENV: ${{ inputs.infisical_env }}
      WRANGLER_ENV: ${{ inputs.wrangler_env }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Infisical ↔ wrangler env pairing
        run: node scripts/validate-env-pair.mjs

      # Bootstrap v1 — GitHub Actions secrets → sync script (reads allowlisted names from env).
      # Use until Infisical OIDC machine identity is configured.
      - name: Sync runtime secrets from GitHub Actions secrets
        if: inputs.secret_source == 'github'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_NOTIFICATION_API_SECRET: ${{ secrets.CLOUDINARY_NOTIFICATION_API_SECRET }}
          COPILOTKIT_LICENSE_TOKEN: ${{ secrets.COPILOTKIT_LICENSE_TOKEN }}
          INTELLIGENCE_API_KEY: ${{ secrets.INTELLIGENCE_API_KEY }}
          INTELLIGENCE_API_URL: ${{ secrets.INTELLIGENCE_API_URL }}
          INTELLIGENCE_GATEWAY_WS_URL: ${{ secrets.INTELLIGENCE_GATEWAY_WS_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          INTERNAL_WEBHOOK_SECRET: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}
        run: |
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"

      - name: Authenticate to Infisical (OIDC)
        if: inputs.secret_source == 'infisical-oidc' && vars.INFISICAL_IDENTITY_ID != ''
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}

      - name: Sync runtime secrets to Cloudflare (OIDC)
        if: inputs.secret_source == 'infisical-oidc' && vars.INFISICAL_IDENTITY_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"
