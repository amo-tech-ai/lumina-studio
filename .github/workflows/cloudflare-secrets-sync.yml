# IPI-606 · CF-SEC-010 — Infisical → Cloudflare runtime secret sync (manual v1)
#
# workflow_dispatch only — operators enable after Infisical OIDC machine identity is configured.
# Does NOT auto-sync production on every PR.
#
# Docs: app/docs/infisical-cloudflare-secrets.md

name: Cloudflare secrets sync

on:
  workflow_dispatch:
    inputs:
      infisical_env:
        description: Infisical environment slug (dev | staging | prod)
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      wrangler_env:
        description: Wrangler environment (preview | production)
        required: true
        type: choice
        options:
          - preview
          - production
      dry_run:
        description: Dry run (print secret names only)
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  sync-runtime-secrets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --- OIDC path (preferred) — enable when INFISICAL_IDENTITY_ID repo variable is set ---
      - name: Authenticate to Infisical (OIDC)
        if: vars.INFISICAL_IDENTITY_ID != ''
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ inputs.infisical_env }}
          # Runtime sync allowlist — names only; action injects values into env
          secrets: |
            GEMINI_API_KEY
            GROQ_API_KEY
            OPENAI_API_KEY
            DATABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET
            CLOUDINARY_NOTIFICATION_API_SECRET
            COPILOTKIT_LICENSE_TOKEN
            INTELLIGENCE_API_KEY
            INTELLIGENCE_API_URL
            INTELLIGENCE_GATEWAY_WS_URL
            FIRECRAWL_API_KEY
            AI_GATEWAY_URL
            AI_GATEWAY_API_KEY
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID

      # --- Bootstrap fallback (temporary) — remove after OIDC verified ---
      - name: Install Infisical CLI (Universal Auth bootstrap)
        if: vars.INFISICAL_IDENTITY_ID == ''
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo bash
          sudo apt-get install -y infisical

      # secrets-action injects allowlisted names into the job environment — never log values.
      - name: Sync runtime secrets to Cloudflare (OIDC)
        if: vars.INFISICAL_IDENTITY_ID != ''
        run: |
          ARGS="--wrangler-env ${{ inputs.wrangler_env }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs $ARGS

      - name: Sync runtime secrets (Universal Auth bootstrap)
        if: vars.INFISICAL_IDENTITY_ID == ''
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" \
            --client-secret="$INFISICAL_CLIENT_SECRET" \
            --plain --silent)
          ARGS="--wrangler-env ${{ inputs.wrangler_env }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          infisical run --project-slug="${{ vars.INFISICAL_PROJECT_SLUG }}" \
            --env="${{ inputs.infisical_env }}" -- \
            node scripts/sync-wrangler-secrets-from-infisical.mjs $ARGS

  # Optional build-time secrets example — not wired to PR CI until OIDC ready.
  # Uncomment and add to ci.yml app-build when INFISICAL_IDENTITY_ID is configured:
