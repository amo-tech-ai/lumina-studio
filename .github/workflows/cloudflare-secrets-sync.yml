# IPI-606 · CF-SEC-010 — Infisical → Cloudflare runtime secret sync (manual v1)
#
# workflow_dispatch only — operators enable after Infisical OIDC machine identity is configured.
# Does NOT auto-sync production on every PR.
#
# Docs: app/docs/infisical-cloudflare-secrets.md

name: Cloudflare secrets sync

on:
  workflow_dispatch:
    inputs:
      infisical_env:
        description: Infisical environment slug (dev | staging | prod)
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      wrangler_env:
        description: Wrangler environment (preview | production)
        required: true
        type: choice
        options:
          - preview
          - production
      dry_run:
        description: Dry run (print secret names only)
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  sync-runtime-secrets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      INFISICAL_ENV: ${{ inputs.infisical_env }}
      WRANGLER_ENV: ${{ inputs.wrangler_env }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Infisical ↔ wrangler env pairing
        run: node scripts/validate-env-pair.mjs

      # Infisical/secrets-action@v1.0.9 has no per-secret allowlist input — it exports all
      # secrets from the configured path. sync-wrangler-secrets-from-infisical.mjs reads only
      # RUNTIME_* allowlisted names. Scope the machine identity to least-privilege paths in Infisical.
      - name: Authenticate to Infisical (OIDC)
        if: vars.INFISICAL_IDENTITY_ID != ''
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}

      - name: Sync runtime secrets to Cloudflare (OIDC)
        if: vars.INFISICAL_IDENTITY_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"

      # --- Bootstrap fallback (temporary) — remove after OIDC verified ---
      - name: Install Infisical CLI (Universal Auth bootstrap)
        if: vars.INFISICAL_IDENTITY_ID == ''
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo bash
          sudo apt-get install -y infisical

      - name: Sync runtime secrets (Universal Auth bootstrap)
        if: vars.INFISICAL_IDENTITY_ID == ''
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
        run: |
          export INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" \
            --client-secret="$INFISICAL_CLIENT_SECRET" \
            --plain --silent)
          ARGS=(--infisical-env "$INFISICAL_ENV" --wrangler-env "$WRANGLER_ENV")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          infisical run --projectId="$INFISICAL_PROJECT_ID" \
            --env="$INFISICAL_ENV" -- \
            node scripts/sync-wrangler-secrets-from-infisical.mjs "${ARGS[@]}"
