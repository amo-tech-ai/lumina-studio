name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    # Repo is public — issue/PR comments are open to any GitHub user by default.
    # Gate on both the trigger phrase AND the commenter's relationship to the repo,
    # so a comment alone from an outside user can't spend ZHIPU_API_KEY or mint an
    # OIDC token in this workflow's context.
    if: |
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      ) &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Pinned to a commit SHA (dev branch tip as of 2026-07-14), not @latest —
      # @latest lets any future or compromised release of anomalyco/opencode run
      # in this repo's authenticated workflow context with zero review.
      - name: Run opencode
        uses: anomalyco/opencode/github@cb8be9ba1217c2e7a2b93cf513eb21b41a7f5365
        env:
          # zai-coding-plan/glm-5.2 resolves its credential via ZHIPU_API_KEY
          # (models.dev provider catalog), not ZAI_API_KEY.
          ZHIPU_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          model: zai-coding-plan/glm-5.2
